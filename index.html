  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root{--bg:#0e0f14;--fg:#f0ece4;--muted:#6b6872;--accent:#e8553d;--accent-glow:rgba(232,85,61,0.35);--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07);--teal:#2ec4a2;--teal-glow:rgba(46,196,162,0.3);--gold:#d4a03c;--gold-glow:rgba(212,160,60,0.3);--sky:#3daae8;--sky-glow:rgba(61,170,232,0.3);--purple:#9b59b6;--purple-glow:rgba(155,89,182,0.3);--rose:#e85577;--rose-glow:rgba(232,85,119,0.3)}
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;background:var(--bg);overflow:hidden;position:relative;-webkit-user-select:none;user-select:none}
    .bg-layer{position:fixed;inset:0;z-index:0;overflow:hidden}
    .blob{position:absolute;border-radius:50%;filter:blur(100px);opacity:.5;animation:blobFloat 12s ease-in-out infinite alternate}
    .blob-1{width:500px;height:500px;background:radial-gradient(circle,var(--accent) 0%,transparent 70%);top:-10%;left:-8%;animation-duration:14s}
    .blob-2{width:450px;height:450px;background:radial-gradient(circle,var(--teal) 0%,transparent 70%);bottom:-12%;right:-6%;animation-duration:16s;animation-delay:-4s}
    .blob-3{width:350px;height:350px;background:radial-gradient(circle,var(--gold) 0%,transparent 70%);top:50%;left:55%;transform:translate(-50%,-50%);animation-duration:18s;animation-delay:-8s;opacity:.3}
    @keyframes blobFloat{0%{transform:translate(0,0) scale(1)}33%{transform:translate(60px,-40px) scale(1.1)}66%{transform:translate(-30px,50px) scale(.95)}100%{transform:translate(40px,20px) scale(1.05)}}
    .grid-overlay{position:fixed;inset:0;z-index:1;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:.4;animation:gridShift 20s linear infinite}
    @keyframes gridShift{0%{transform:translate(0,0)}100%{transform:translate(60px,60px)}}
    .noise-overlay{position:fixed;inset:0;z-index:2;opacity:.03;pointer-events:none;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
    .particles{position:fixed;inset:0;z-index:3;pointer-events:none}
    .particle{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--fg);opacity:0;animation:particleRise linear infinite}
    @keyframes particleRise{0%{opacity:0;transform:translateY(0) scale(.5)}15%{opacity:.6}85%{opacity:.3}100%{opacity:0;transform:translateY(-100vh) scale(0)}}
    .main-container{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:44px}
    .title-section{text-align:center;animation:fadeSlideUp 1s ease-out both}
    .title-section h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:700;color:var(--fg);letter-spacing:-1px;line-height:1.1}
    .title-section h1 span{background:linear-gradient(135deg,var(--accent),#f2a03d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .title-section p{margin-top:12px;color:var(--muted);font-size:1rem;font-weight:400;letter-spacing:.3px}
    @keyframes fadeSlideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    @keyframes overlayIntro{from{opacity:0}to{opacity:1}}
    @keyframes boxIntro{from{opacity:0;transform:scale(.92) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes boxOutro{from{opacity:1;transform:scale(1) translateY(0)}to{opacity:0;transform:scale(.92) translateY(20px)}}
    @keyframes overlayOutro{from{opacity:1}to{opacity:0}}
    @keyframes rowIntro{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
    @keyframes imgIntro{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
    @keyframes imgOutro{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.85)}}
    @keyframes checkPop{0%{transform:scale(.4)}55%{transform:scale(1.35)}100%{transform:scale(1)}}
    .btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;animation:fadeSlideUp 1s ease-out .2s both;width:100%;max-width:560px}
    .doc-btn{display:flex;align-items:center;gap:12px;padding:16px 24px;border:1px solid var(--border);border-radius:14px;background:var(--card);backdrop-filter:blur(16px);color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:500;cursor:pointer;position:relative;overflow:hidden;transition:all .35s cubic-bezier(.25,.46,.45,.94)}
    .doc-btn::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .35s;border-radius:inherit}
    .doc-btn .icon-wrap{display:flex;align-items:center;justify-content:center;width:42px;height:42px;min-width:42px;border-radius:10px;font-size:1.1rem;transition:transform .35s,box-shadow .35s;position:relative;z-index:1}
    .doc-btn .btn-text{display:flex;flex-direction:column;gap:2px;position:relative;z-index:1}
    .doc-btn .btn-text .label{font-size:.95rem;font-weight:600;line-height:1.2}
    .doc-btn .btn-text .sublabel{font-size:.7rem;color:var(--muted);font-weight:400;letter-spacing:.3px}
    .doc-btn .badge{position:absolute;top:10px;right:10px;min-width:20px;height:20px;border-radius:10px;background:var(--accent);color:#fff;font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px;z-index:2;opacity:0;transform:scale(0);transition:all .3s cubic-bezier(.34,1.56,.64,1)}
    .doc-btn .badge.show{opacity:1;transform:scale(1)}
    .doc-btn.hidden-btn{display:none!important}
    .btn-view1 .icon-wrap{background:linear-gradient(135deg,var(--teal),#1a9e80);color:#fff;box-shadow:0 4px 16px var(--teal-glow)}
    .btn-view1::before{background:linear-gradient(135deg,rgba(46,196,162,.1),transparent)}
    .btn-view1:hover{border-color:var(--teal);box-shadow:0 0 30px var(--teal-glow),0 8px 32px rgba(0,0,0,.3);transform:translateY(-3px)}
    .btn-view2 .icon-wrap{background:linear-gradient(135deg,var(--sky),#2b8ac4);color:#fff;box-shadow:0 4px 16px var(--sky-glow)}
    .btn-view2::before{background:linear-gradient(135deg,rgba(61,170,232,.1),transparent)}
    .btn-view2:hover{border-color:var(--sky);box-shadow:0 0 30px var(--sky-glow),0 8px 32px rgba(0,0,0,.3);transform:translateY(-3px)}
    .btn-view3 .icon-wrap{background:linear-gradient(135deg,var(--purple),#7d3c98);color:#fff;box-shadow:0 4px 16px var(--purple-glow)}
    .btn-view3::before{background:linear-gradient(135deg,rgba(155,89,182,.1),transparent)}
    .btn-view3:hover{border-color:var(--purple);box-shadow:0 0 30px var(--purple-glow),0 8px 32px rgba(0,0,0,.3);transform:translateY(-3px)}
    .btn-view4 .icon-wrap{background:linear-gradient(135deg,var(--rose),#c23a55);color:#fff;box-shadow:0 4px 16px var(--rose-glow)}
    .btn-view4::before{background:linear-gradient(135deg,rgba(232,85,119,.1),transparent)}
    .btn-view4:hover{border-color:var(--rose);box-shadow:0 0 30px var(--rose-glow),0 8px 32px rgba(0,0,0,.3);transform:translateY(-3px)}
    .btn-add2 .icon-wrap{background:linear-gradient(135deg,var(--gold),#b8882e);color:#fff;box-shadow:0 4px 16px var(--gold-glow)}
    .btn-add2::before{background:linear-gradient(135deg,rgba(212,160,60,.1),transparent)}
    .btn-add2:hover{border-color:var(--gold);box-shadow:0 0 30px var(--gold-glow),0 8px 32px rgba(0,0,0,.3);transform:translateY(-3px)}
    .doc-btn:active{transform:translateY(-1px) scale(.98)}
    .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.2);transform:scale(0);animation:rippleAnim .6s ease-out forwards;pointer-events:none}
    @keyframes rippleAnim{to{transform:scale(4);opacity:0}}
    .sub-choice{display:none;flex-direction:column;gap:12px;animation:fadeSlideUp .35s ease-out both;grid-column:1/-1}
    .sub-choice.visible{display:flex}
    .sub-choice-row{display:flex;gap:12px}
    .sub-btn{display:flex;align-items:center;gap:10px;padding:14px 20px;border:1px solid var(--border);border-radius:12px;background:var(--card);backdrop-filter:blur(16px);color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .3s ease;flex:1}
    .sub-btn:hover{transform:translateY(-2px)}
    .sub-btn .sub-icon{display:flex;align-items:center;justify-content:center;width:36px;height:36px;min-width:36px;border-radius:8px;font-size:.95rem}
    .sub-btn.choose-file .sub-icon{background:linear-gradient(135deg,var(--gold),#b8882e);color:#fff}
    .sub-btn.choose-file:hover{border-color:var(--gold);box-shadow:0 0 20px var(--gold-glow)}
    .sub-btn.camera-shot .sub-icon{background:linear-gradient(135deg,var(--accent),#c23a25);color:#fff}
    .sub-btn.camera-shot:hover{border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow)}
    .back-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:.75rem;cursor:pointer;transition:all .25s;align-self:flex-start}
    .back-btn:hover{color:var(--fg);border-color:rgba(255,255,255,.15)}
    .overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;backdrop-filter:blur(12px);z-index:105}
    .overlay.active{display:flex}
    .overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,.8);animation:overlayIntro .35s ease-out both}
    .overlay.closing .overlay-bg{animation:overlayOutro .25s ease-in both}
    .anim-box{position:relative;z-index:1;animation:boxIntro .4s cubic-bezier(.22,1,.36,1) both}
    .overlay.closing .anim-box{animation:boxOutro .25s ease-in both}
    .doc-table tbody tr{animation:rowIntro .35s ease-out both}
    .camera-overlay{position:fixed;inset:0;z-index:100;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center}
    .camera-overlay.active{display:flex}
    .camera-overlay video{width:100%;height:100%;object-fit:cover}
    .camera-controls{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);display:flex;gap:30px;align-items:center}
    .cam-btn{width:56px;height:56px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:rgba(0,0,0,.4);backdrop-filter:blur(8px);color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s}
    .cam-btn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.5);transform:scale(1.1)}
    .cam-btn.close-cam{border-color:#ff4d4d;color:#ff4d4d}
    .cam-btn.close-cam:hover{background:rgba(255,77,77,.2)}
    .cam-btn.capture{width:70px;height:70px;border-color:#fff;border-width:3px;font-size:1.4rem}
    .cam-btn.capture:hover{background:rgba(255,255,255,.2)}
    .flash{position:fixed;inset:0;background:#fff;z-index:110;opacity:0;pointer-events:none}
    .flash.fire{animation:flashAnim .4s ease-out}
    @keyframes flashAnim{0%{opacity:.9}100%{opacity:0}}
    .preview-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center}
    .preview-content img{max-width:80vw;max-height:55vh;border-radius:12px;border:2px solid rgba(255,255,255,.1);box-shadow:0 20px 60px rgba(0,0,0,.5);animation:imgIntro .45s cubic-bezier(.22,1,.36,1) both}
    .overlay.closing .preview-content img{animation:imgOutro .25s ease-in both}
    .preview-label{margin-top:16px;color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.9rem;opacity:.7}
    .preview-actions{display:flex;gap:12px;margin-top:14px}
    .preview-btn{padding:10px 24px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:8px}
    .preview-btn:hover{background:rgba(255,255,255,.15)}
    .preview-btn.next-btn{background:linear-gradient(135deg,var(--gold),#b8882e);border-color:var(--gold);color:#fff}
    .preview-btn.next-btn:hover{box-shadow:0 0 20px var(--gold-glow);transform:translateY(-2px)}
    .save-box{width:340px;max-width:90vw;background:rgba(22,22,30,.95);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:28px;backdrop-filter:blur(20px);display:flex;flex-direction:column;gap:20px;max-height:90vh;overflow-y:auto}
    .save-box-title{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;color:var(--fg);display:flex;align-items:center;gap:10px}
    .save-box-title i{color:var(--gold)}
    .input-group{display:flex;flex-direction:column;gap:6px}
    .input-group label{font-size:.75rem;font-weight:500;color:var(--muted);letter-spacing:.8px;text-transform:uppercase}
    .input-group input{padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.9rem;outline:none;transition:border-color .25s,box-shadow .25s}
    .input-group input::placeholder{color:var(--muted);opacity:.6}
    .input-group input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
    .error-msg{font-size:.72rem;color:var(--accent);min-height:16px}
    .class-group{display:flex;flex-direction:column;gap:6px}
    .class-group label{font-size:.75rem;font-weight:500;color:var(--muted);letter-spacing:.8px;text-transform:uppercase}
    .class-options{display:flex;flex-direction:column;gap:8px}
    .class-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .25s}
    .class-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--muted);transition:all .25s;flex-shrink:0}
    .class-btn:hover{border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.03)}
    .class-btn.selected .class-dot{background:var(--gold);border-color:var(--gold)}
    .class-btn.c1 .class-dot{border-color:var(--teal)}.class-btn.c1.selected{border-color:var(--teal);background:rgba(46,196,162,.08)}.class-btn.c1.selected .class-dot{background:var(--teal);border-color:var(--teal)}
    .class-btn.c2 .class-dot{border-color:var(--sky)}.class-btn.c2.selected{border-color:var(--sky);background:rgba(61,170,232,.08)}.class-btn.c2.selected .class-dot{background:var(--sky);border-color:var(--sky)}
    .class-btn.c3 .class-dot{border-color:var(--purple)}.class-btn.c3.selected{border-color:var(--purple);background:rgba(155,89,182,.08)}.class-btn.c3.selected .class-dot{background:var(--purple);border-color:var(--purple)}
    .class-btn.c4 .class-dot{border-color:var(--rose)}.class-btn.c4.selected{border-color:var(--rose);background:rgba(232,85,119,.08)}.class-btn.c4.selected .class-dot{background:var(--rose);border-color:var(--rose)}
    .finished-btn{padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--gold),#b8882e);color:#fff;font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:8px}
    .finished-btn:hover{box-shadow:0 6px 24px var(--gold-glow);transform:translateY(-2px)}
    .finished-btn:active{transform:translateY(0) scale(.98)}
    .finished-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
    .table-box{width:440px;max-width:92vw;max-height:80vh;background:rgba(22,22,30,.96);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:24px;backdrop-filter:blur(20px);display:flex;flex-direction:column;gap:16px;overflow:hidden}
    .table-header{display:flex;align-items:center;justify-content:space-between;min-height:40px}
    .header-left{position:relative;display:flex;align-items:center;flex:1;overflow:hidden;height:40px}
    .table-title,.select-bar{position:absolute;left:0;right:0;top:0;bottom:0;display:flex;align-items:center;gap:10px;transition:opacity .3s,transform .3s;white-space:nowrap;padding-right:10px}
    .table-title{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;color:var(--fg);opacity:1;transform:translateY(0);pointer-events:auto}
    .table-title.hidden{opacity:0;transform:translateY(-12px);pointer-events:none}
    .select-bar{opacity:0;transform:translateY(12px);pointer-events:none;gap:8px;flex-wrap:nowrap}
    .select-bar.visible{opacity:1;transform:translateY(0);pointer-events:auto}
    .doc-count-icon{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;border-radius:7px;padding:0 6px;color:#fff;font-size:.75rem;font-weight:700;font-family:'Space Grotesk',sans-serif;flex-shrink:0}
    .table-close{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;flex-shrink:0}
    .table-close:hover{color:var(--fg);border-color:rgba(255,255,255,.2)}
    .search-icon-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .search-icon-btn:hover{color:var(--fg)}
    .search-input{display:none;padding:5px 10px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.82rem;outline:none;flex:1;min-width:0}
    .search-input:focus{border-color:var(--gold)}
    .search-input::placeholder{color:var(--muted);opacity:.5}
    .search-clear-btn{display:none;width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.7rem;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0}
    .search-clear-btn:hover{color:var(--fg)}
    #tableTitle.search-active .search-icon-btn{display:none}
    #tableTitle.search-active .search-input{display:block}
    #tableTitle.search-active .search-clear-btn{display:flex}
    .sel-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.75rem;font-weight:500;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:6px;white-space:nowrap}
    .sel-btn:hover{background:rgba(255,255,255,.12)}
    .sel-btn.move-btn{background:linear-gradient(135deg,var(--gold),#b8882e);border-color:var(--gold);color:#fff}
    .sel-btn:disabled{opacity:.35;cursor:not-allowed}
    .sel-btn.exit-btn{border-color:rgba(255,77,77,.3);color:#ff6b6b}
    .sel-btn.delete-sel-btn{border-color:rgba(255,77,77,.3);color:#ff6b6b}
    .sel-count{font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:4px;white-space:nowrap}
    .table-wrap{overflow-y:auto;flex:1;border-radius:10px;border:1px solid var(--border)}
    .table-wrap::-webkit-scrollbar{width:4px}
    .table-wrap::-webkit-scrollbar-thumb{background:var(--muted);border-radius:4px}
    .doc-table{width:100%;border-collapse:collapse}

    window.addEventListener('online', () => { showToast('Back online. Syncing...', 'fa-solid fa-wifi'); processQueue(); });
    async function loadStoreFirebase() { if(!db) return; try { const snap = await db.ref('documents').once('value'); if (snap.exists()) { const data = snap.val(); Object.keys(store).forEach(cls => store[cls] = {}); Object.keys(data).forEach(docId => { const d = data[docId]; if (store[d.class]) { store[d.class][docId] = { ...d, id: docId }; if (!store[d.class][docId].extras) store[d.class][docId].extras = {}; } }); saveStoreLocal(); } } catch(e) {} }

    (function(){const c=document.getElementById('particles');for(let i=0;i<30;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.top=(80+Math.random()*40)+'%';p.style.width=p.style.height=(1.5+Math.random()*2.5)+'px';p.style.animationDuration=(6+Math.random()*10)+'s';p.style.animationDelay=(Math.random()*8)+'s';const cols=['#e8553d','#2ec4a2','#d4a03c','#3daae8','#9b59b6','#f0ece4'];p.style.background=cols[Math.floor(Math.random()*cols.length)];c.appendChild(p)}})();
    function showToast(m,ic){const t=document.getElementById('toast');t.innerHTML=`<i class="${ic}"></i> ${m}`;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500)}
    function createRipple(e,btn){const r=document.createElement('span');r.className='ripple';const rect=btn.getBoundingClientRect();const sz=Math.max(rect.width,rect.height);r.style.width=r.style.height=sz+'px';r.style.left=(e.clientX-rect.left-sz/2)+'px';r.style.top=(e.clientY-rect.top-sz/2)+'px';btn.appendChild(r);r.addEventListener('animationend',()=>r.remove())}
    const OUTRO_DURATION=280;
    function openOvl(id){const el=document.getElementById(id);el.classList.remove('closing');el.classList.add('active')}
    function closeOvl(id,cb){const el=document.getElementById(id);el.classList.add('closing');setTimeout(()=>{el.classList.remove('active','closing');if(cb)cb()},OUTRO_DURATION)}
    function updateBadges(){Object.keys(store).forEach(cls=>{const b=document.getElementById(classBadgeIds[cls]);if(b){b.textContent=Object.keys(store[cls]).length;b.classList.toggle('show',Object.keys(store[cls]).length>0)}})}

    let currentTableCls=null,selectMode=false,selectedRows=new Set(), deleteTarget=null, moveDestination=null, pendingImageBase64=null, addImgBase64=null, cameraMode=null, cameraStream=null, currentDetailCls=null, currentDetailDocId=null;
    Object.keys(store).forEach((cls,i)=>{const btn=document.getElementById('btnView'+(i+1));if(btn)btn.addEventListener('click',function(e){createRipple(e,this);openDocTable(cls)})});
    
    function openDocTable(cls){currentTableCls=cls;selectMode=false;selectedRows.clear();document.getElementById('searchInput').value='';document.getElementById('tableTitle').classList.remove('search-active');renderTable();openOvl('tableOverlay')}
    function getSortedDocs(cls){return Object.values(store[cls]).sort((a,b)=>a.name.localeCompare(b.name))}

    function renderTable(){const docs=getSortedDocs(currentTableCls),tbody=document.getElementById('tableBody'),table=document.getElementById('docTable');tbody.innerHTML='';table.classList.toggle('select-mode',selectMode);document.getElementById('tableTitle').classList.toggle('hidden',selectMode);document.getElementById('selectBar').classList.toggle('visible',selectMode);document.getElementById('tableCountIcon').textContent=Object.keys(store[currentTableCls]).length;document.getElementById('tableCountIcon').style.background=classColors[currentTableCls];if(!docs.length){tbody.innerHTML=`<tr><td colspan="3"><div class="doc-hint"><i class="fa-solid fa-inbox"></i>No documents yet.</div></td></tr>`;return}docs.forEach((doc,idx)=>{const tr=document.createElement('tr');tr.dataset.docId=doc.id;const isSel=selectedRows.has(doc.id);if(isSel)tr.classList.add('row-selected');const tdC=document.createElement('td');tdC.className='cell-check';tdC.innerHTML=`<i class="fa-solid fa-circle-check ${isSel?'checked':''}"></i>`;tdC.addEventListener('click',e=>{e.stopPropagation();if(selectMode)toggleRowAnimated(doc.id)});tr.appendChild(tdC);const tdI=document.createElement('td');tdI.className='doc-index';tdI.textContent=idx+1;tr.appendChild(tdI);const tdN=document.createElement('td');tdN.innerHTML=`<div class="name-cell"><span class="doc-name-text">${doc.name}</span><button class="view-icon-btn"><i class="fa-solid fa-eye"></i></button></div>`;tdN.querySelector('.view-icon-btn').addEventListener('click',e=>{e.stopPropagation();openImageDetail(currentTableCls,doc.id)});tr.appendChild(tdN);tr.addEventListener('click',()=>{if(selectMode)toggleRowAnimated(doc.id)});tr.addEventListener('dblclick',()=>{if(!selectMode){selectMode=true;selectedRows.add(doc.id);renderTable()}});tbody.appendChild(tr)});updateSelectUI()}
    function toggleRowAnimated(id){const tr=document.querySelector(`#tableBody tr[data-doc-id="${id}"]`);if(!tr)return;const ci=tr.querySelector('.cell-check i');if(selectedRows.has(id)){selectedRows.delete(id);tr.classList.remove('row-selected');ci.classList.remove('checked','check-anim')}else{selectedRows.add(id);tr.classList.add('row-selected');ci.classList.remove('check-anim');void ci.offsetWidth;ci.classList.add('checked','check-anim')}updateSelectUI()}
    function updateSelectUI(){const cnt=selectedRows.size;document.getElementById('selectCount').textContent=cnt;document.getElementById('moveBtn').disabled=cnt===0;document.getElementById('deleteSelBtn').disabled=cnt===0;const docs=getSortedDocs(currentTableCls);document.getElementById('selectAllBtn').innerHTML=selectedRows.size===docs.length&&docs.length>0?'<i class="fa-solid fa-xmark"></i> None':'<i class="fa-solid fa-check-double"></i> All'}
    document.getElementById('selectAllBtn').addEventListener('click',()=>{const docs=getSortedDocs(currentTableCls);if(selectedRows.size===docs.length)selectedRows.clear();else docs.forEach(d=>selectedRows.add(d.id));renderTable()});
    document.getElementById('exitSelectBtn').addEventListener('click',()=>{selectMode=false;selectedRows.clear();renderTable()});
    document.getElementById('tableCloseBtn').addEventListener('click',()=>closeOvl('tableOverlay',()=>{selectMode=false;selectedRows.clear()}));
    document.getElementById('tableOverlay').querySelector('.overlay-bg').addEventListener('click',()=>closeOvl('tableOverlay',()=>{selectMode=false;selectedRows.clear()}));
    document.getElementById('searchIconBtn').addEventListener('click',()=>{document.getElementById('tableTitle').classList.add('search-active');document.getElementById('searchInput').focus()});
    document.getElementById('searchClearBtn').addEventListener('click',()=>{document.getElementById('searchInput').value='';document.getElementById('tableTitle').classList.remove('search-active');filterTable('')});
    document.getElementById('searchInput').addEventListener('input',function(){filterTable(this.value)});
    function filterTable(t){const lt=t.toLowerCase().trim();let vis=0;document.querySelectorAll('#tableBody tr[data-doc-id]').forEach(r=>{const n=r.querySelector('.doc-name-text');if(!lt){r.style.display='';vis++;return}if(n.textContent.toLowerCase().startsWith(lt)){r.style.display='';vis++}else r.style.display='none'})}
    
    document.getElementById('deleteSelBtn').addEventListener('click',()=>{if(!selectedRows.size)return;deleteTarget={type:'bulk',items:Array.from(selectedRows)};document.getElementById('deleteConfirmMsg').textContent=`Delete ${selectedRows.size} files?`;openOvl('deleteConfirmOverlay')});
    document.getElementById('moveBtn').addEventListener('click',()=>{if(!selectedRows.size)return;const o=document.getElementById('moveOptions');o.innerHTML='';Object.keys(store).forEach(cls=>{if(cls===currentTableCls)return;const b=document.createElement('button');b.className='move-opt-btn';b.innerHTML=`<span class="move-dot" style="background:${classColors[cls]}"></span><span style="color:${classColors[cls]}">${classNames[cls]}</span>`;b.addEventListener('click',()=>{moveDestination=cls;closeOvl('moveOverlay',openConfirm())});o.appendChild(b)});openOvl('moveOverlay')});
    document.querySelector('#moveOverlay .overlay-bg').addEventListener('click',()=>closeOvl('moveOverlay'));
    function openConfirm(){document.getElementById('confirmMsg').textContent=`Move ${selectedRows.size} files to ${classNames[moveDestination]}?`;openOvl('confirmOverlay')}
    document.getElementById('confirmNo').addEventListener('click',()=>closeOvl('confirmOverlay'));
    document.querySelector('#confirmOverlay .overlay-bg').addEventListener('click',()=>closeOvl('confirmOverlay'));
    document.getElementById('confirmYes').addEventListener('click',()=>closeOvl('confirmOverlay',openPw));
    function openPw(){document.getElementById('pwInput').value='';document.getElementById('pwError').textContent='';openOvl('pwOverlay');setTimeout(()=>document.getElementById('pwInput').focus(),300)}
    document.getElementById('pwCancel').addEventListener('click',()=>closeOvl('pwOverlay'));
    document.querySelector('#pwOverlay .overlay-bg').addEventListener('click',()=>closeOvl('pwOverlay'));
    document.getElementById('pwSubmit').addEventListener('click',submitPw);document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')submitPw()});
    async function submitPw(){if(document.getElementById('pwInput').value==='0000'){const mv=[];selectedRows.forEach(id=>{const d=store[currentTableCls][id];if(d){mv.push(d);delete store[currentTableCls][id];addSyncTask({type:'delete',docId:id})}});store[moveDestination]=store[moveDestination]||{};mv.forEach(d=>{d.class=moveDestination;store[moveDestination][d.id]=d;addSyncTask({type:'save',docId:d.id,cls:moveDestination})});saveStoreLocal();closeOvl('pwOverlay',()=>{selectedRows.clear();selectMode=false;moveDestination=null;updateBadges();renderTable();showToast('Moved','fa-solid fa-check-circle');processQueue()})}else{document.getElementById('pwError').textContent='Wrong password';document.getElementById('pwInput').value=''}}
    
    function openImageDetail(cls,id){const d=store[cls][id];if(!d)return;currentDetailCls=cls;currentDetailDocId=id;renderDetailImages();openOvl('detailOverlay')}
    function renderDetailImages(){const d=store[currentDetailCls][currentDetailDocId];if(!d)return;const c=document.getElementById('detailImages');c.innerHTML='';const ex=Object.entries(d.extras||{});if(ex.length){ex.reverse().forEach(([eid,x],ri)=>{const it=document.createElement('div');it.className='detail-img-item';it.innerHTML=`<img src="${getImgSrc(x)}" style="animation-delay:${ri*.08}s"><p class="detail-img-name">${x.name}</p><div class="img-actions"><button class="delete-btn" data-type="extra" data-eid="${eid}"><i class="fa-solid fa-trash-can"></i> Delete</button><button class="download-btn" data-type="extra"><i class="fa-solid fa-download"></i> Download</button></div>`;it.querySelector('.download-btn').addEventListener('click',()=>downloadImage(x.name,getImgSrc(x)));it.querySelector('.delete-btn').addEventListener('click',()=>requestDelete('extra',eid,x.name));c.appendChild(it)})}const o=document.createElement('div');o.className='detail-img-item';o.innerHTML=`<img src="${getImgSrc(d)}" style="animation-delay:${ex.length*.08+.08}s"><p class="detail-img-name">${d.name}</p><div class="img-actions"><button class="delete-btn" data-type="original"><i class="fa-solid fa-trash-can"></i> Delete</button><button class="download-btn" data-type="original"><i class="fa-solid fa-download"></i> Download</button></div>`;o.querySelector('.download-btn').addEventListener('click',()=>downloadImage(d.name,getImgSrc(d)));o.querySelector('.delete-btn').addEventListener('click',()=>requestDelete('original',null,d.name));c.appendChild(o)}
    
    function downloadImage(name,url){fetch(url,{mode:'cors'}).then(r=>r.blob()).then(b=>{const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name+'.png';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);showToast(`Downloading "${name}"`,'fa-solid fa-download')}).catch(()=>{window.open(url,'_blank')})}
    document.getElementById('detailCloseBtn').addEventListener('click',()=>closeOvl('detailOverlay'));
    document.getElementById('detailOverlay').querySelector('.overlay-bg').addEventListener('click',()=>closeOvl('detailOverlay'));
    
    document.getElementById('addImgBtn').addEventListener('click',()=>{addImgBase64=null;document.getElementById('addImgNameInput').value='';document.getElementById('addImgNameError').textContent='';document.getElementById('addImgStep1').style.display='flex';document.getElementById('addImgStep2').classList.remove('visible');document.getElementById('addImgStep3').classList.remove('visible');openOvl('addImgOverlay')});
    document.getElementById('addImgFileBtn').addEventListener('click',()=>document.getElementById('addImgFileInput').click());
    document.getElementById('addImgFileInput').addEventListener('change',function(){if(this.files[0]){const r=new FileReader();r.onload=e=>{addImgBase64=e.target.result;document.getElementById('addImgPreview').src=addImgBase64;document.getElementById('addImgThumb').src=addImgBase64;document.getElementById('addImgNameInput').value=this.files[0].name.replace(/\.[^.]+$/,'');document.getElementById('addImgStep1').style.display='none';document.getElementById('addImgStep2').classList.add('visible')};r.readAsDataURL(this.files[0]);this.value=''}});
    document.getElementById('addImgCamBtn').addEventListener('click',()=>closeOvl('addImgOverlay',startCamera.bind(null,'addImg')));
    document.getElementById('addImgNextBtn').addEventListener('click',()=>{document.getElementById('addImgStep2').classList.remove('visible');document.getElementById('addImgStep3').classList.add('visible');document.getElementById('addImgSaveBtn').disabled=!document.getElementById('addImgNameInput').value.trim();setTimeout(()=>document.getElementById('addImgNameInput').focus(),100)});
    document.getElementById('addImgNameInput').addEventListener('input',()=>document.getElementById('addImgSaveBtn').disabled=!document.getElementById('addImgNameInput').value.trim());
    
    document.getElementById('addImgSaveBtn').addEventListener('click',async ()=>{const n=document.getElementById('addImgNameInput').value.trim();if(!n){document.getElementById('addImgNameError').textContent='Required';return}const d=store[currentDetailCls][currentDetailDocId];const b=document.getElementById('addImgSaveBtn');b.disabled=true;b.innerHTML='<span class="spinner"></span> Saving';const eid=genId();d.extras[eid]={name:n,imageBase64:addImgBase64,imageUrl:''};if(navigator.onLine){try{d.extras[eid].imageUrl=await uploadToCloudinary(addImgBase64);delete d.extras[eid].imageBase64;await saveDocFirebase(currentDetailDocId,currentDetailCls,d)}catch(e){addSyncTask({type:'save',docId:currentDetailDocId,cls:currentDetailCls})}}else addSyncTask({type:'save',docId:currentDetailDocId,cls:currentDetailCls});saveStoreLocal();b.innerHTML='<i class="fa-solid fa-check"></i> Save';b.disabled=false;closeOvl('addImgOverlay',()=>{renderDetailImages();showToast('Added','fa-solid fa-check-circle')})});
    document.getElementById('addImgCancelBtn').addEventListener('click',()=>closeOvl('addImgOverlay'));
    
    function requestDelete(t,eid,n){deleteTarget={type:t,eid:eid,name:n};document.getElementById('deleteConfirmMsg').textContent=`Delete "${n}"?`;openOvl('deleteConfirmOverlay')}
    document.getElementById('deleteConfirmNo').addEventListener('click',()=>closeOvl('deleteConfirmOverlay'));
    document.getElementById('deleteConfirmYes').addEventListener('click',()=>closeOvl('deleteConfirmOverlay',()=>{document.getElementById('deletePwInput').value='';document.getElementById('deletePwError').textContent='';openOvl('deletePwOverlay');setTimeout(()=>document.getElementById('deletePwInput').focus(),300)}));
    document.getElementById('deletePwCancel').addEventListener('click',()=>closeOvl('deletePwOverlay'));
    document.getElementById('deletePwSubmit').addEventListener('click',async()=>{if(document.getElementById('deletePwInput').value==='0000'){if(deleteTarget.type==='bulk'){deleteTarget.items.forEach(id=>{delete store[currentTableCls][id];if(navigator.onLine&&db)deleteDocFirebase(id);else addSyncTask({type:'delete',docId:id})});saveStoreLocal();closeOvl('deletePwOverlay',()=>{selectMode=false;selectedRows.clear();updateBadges();renderTable();showToast('Deleted','fa-solid fa-trash-can')})}else{const d=store[currentDetailCls][currentDetailDocId];if(deleteTarget.type==='extra'){delete d.extras[deleteTarget.eid];saveStoreLocal();if(navigator.onLine&&db)await deleteExtraFirebase(currentDetailDocId,deleteTarget.eid);else addSyncTask({type:'deleteExtra',docId:currentDetailDocId,extraId:deleteTarget.eid});closeOvl('deletePwOverlay',()=>{renderDetailImages();showToast('Deleted','fa-solid fa-trash-can')})}else{delete store[currentDetailCls][currentDetailDocId];saveStoreLocal();if(navigator.onLine&&db)await deleteDocFirebase(currentDetailDocId);else addSyncTask({type:'delete',docId:currentDetailDocId});closeOvl('deletePwOverlay',()=>closeOvl('detailOverlay',()=>{updateBadges();renderTable();showToast('Deleted','fa-solid fa-trash-can')}))}}}else{document.getElementById('deletePwError').textContent='Wrong';document.getElementById('deletePwInput').value=''}});

    const btnAdd=document.getElementById('btnAdd2'),subCh=document.getElementById('subChoice');
    btnAdd.addEventListener('click',e=>{createRipple(e,this);btnAdd.classList.add('hidden-btn');subCh.classList.add('visible')});
    document.getElementById('backBtn').addEventListener('click',()=>{btnAdd.classList.remove('hidden-btn');subCh.classList.remove('visible')});
    document.getElementById('chooseFileBtn').addEventListener('click',()=>document.getElementById('fileInput').click());
    document.getElementById('fileInput').addEventListener('change',function(){if(this.files[0]){const r=new FileReader();r.onload=e=>{pendingImageBase64=e.target.result;document.getElementById('previewImg').src=pendingImageBase64;document.getElementById('previewLabel').textContent=this.files[0].name;openOvl('previewOverlay')};r.readAsDataURL(this.files[0]);this.value=''}});
    
    function startCamera(m){cameraMode=m;document.getElementById('cameraOverlay').classList.add('active');navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(s=>{cameraStream=s;document.getElementById('cameraVideo').srcObject=s}).catch(()=>showToast('Camera denied','fa-solid fa-triangle-exclamation'))}
    function stopCamera(){if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null}document.getElementById('cameraVideo').srcObject=null;document.getElementById('cameraOverlay').classList.remove('active')}
    document.getElementById('cameraShotBtn').addEventListener('click',startCamera.bind(null,'addDoc'));
    document.getElementById('closeCamBtn').addEventListener('click',stopCamera);
    document.getElementById('captureBtn').addEventListener('click',()=>{const v=document.getElementById('cameraVideo'),cv=document.getElementById('captureCanvas');cv.width=v.videoWidth;cv.height=v.videoHeight;cv.getContext('2d').drawImage(v,0,0);const d=cv.toDataURL('image/png');document.getElementById('flash').classList.add('fire');setTimeout(()=>document.getElementById('flash').classList.remove('fire'),500);stopCamera();if(cameraMode==='addDoc'){pendingImageBase64=d;document.getElementById('previewImg').src=d;document.getElementById('previewLabel').textContent='Camera';btnAdd.classList.remove('hidden-btn');subCh.classList.remove('visible');openOvl('previewOverlay')}else{addImgBase64=d;document.getElementById('addImgPreview').src=d;document.getElementById('addImgThumb').src=d;document.getElementById('addImgNameInput').value='Camera';document.getElementById('addImgStep1').style.display='none';document.getElementById('addImgStep2').classList.add('visible');openOvl('addImgOverlay')}});
    
    document.getElementById('previewCloseBtn').addEventListener('click',()=>closeOvl('previewOverlay',()=>{btnAdd.classList.remove('hidden-btn');subCh.classList.remove('visible')}));
    document.getElementById('previewNextBtn').addEventListener('click',()=>closeOvl('previewOverlay',()=>{btnAdd.classList.remove('hidden-btn');subCh.classList.remove('visible');document.getElementById('docNameInput').value='';document.getElementById('nameError').textContent='';document.querySelectorAll('.class-btn').forEach(b=>b.classList.remove('selected'));document.getElementById('finishedBtn').disabled=true;openOvl('saveOverlay');setTimeout(()=>document.getElementById('docNameInput').focus(),300)}));
    document.getElementById('docNameInput').addEventListener('input',()=>{document.getElementById('finishedBtn').disabled=!(document.getElementById('docNameInput').value.trim()&&document.querySelector('.class-btn.selected'))});
    document.querySelectorAll('.class-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.class-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');document.getElementById('finishedBtn').disabled=!document.getElementById('docNameInput').value.trim()}));
    
    document.getElementById('finishedBtn').addEventListener('click',async ()=>{const b=document.getElementById('finishedBtn');b.disabled=true;b.innerHTML='<span class="spinner"></span> Uploading';const n=document.getElementById('docNameInput').value.trim();if(!n){document.getElementById('nameError').textContent='Required';b.innerHTML='Finished';return}const c=document.querySelector('.class-btn.selected');if(!c){b.innerHTML='Finished';return}const t=c.dataset.class;if(Object.values(store[t]).find(d=>d.name===n)){document.getElementById('nameError').textContent='Exists';b.innerHTML='Finished';return}const id=genId();const nd={id,name:n,imageBase64:pendingImageBase64,imageUrl:'',extras:{}};if(navigator.onLine){try{nd.imageUrl=await uploadToCloudinary(pendingImageBase64);delete nd.imageBase64;await saveDocFirebase(id,t,nd)}catch(e){addSyncTask({type:'save',docId:id,cls:t})}}else addSyncTask({type:'save',docId:id,cls:t});store[t][id]=nd;saveStoreLocal();updateBadges();b.innerHTML='Finished';closeOvl('saveOverlay',()=>showToast('Saved','fa-solid fa-check-circle'))});

    loadStoreLocal();updateBadges();if(navigator.onLine&&db)loadStoreFirebase().then(()=>updateBadges());

    // ===== PWA Service Worker Registration =====
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(reg => console.log('SW registered')).catch(err => console.log('SW failed', err));
      });
    }
  </script>
</body>
</html>
