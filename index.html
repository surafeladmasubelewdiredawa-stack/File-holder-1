<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>የሐመረ-ኖኅ ሰንበት ት/ቤት የተማሪዎች ሰነድ መያዣ ድህረ ገፅ</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root{--bg:#0e0f14;--fg:#f0ece4;--muted:#6b6872;--accent:#e8553d;--accent-glow:rgba(232,85,61,0.35);--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07);--teal:#2ec4a2;--teal-glow:rgba(46,196,162,0.3);--gold:#d4a03c;--gold-glow:rgba(212,160,60,0.3);--sky:#3daae8;--sky-glow:rgba(61,170,232,0.3);--purple:#9b59b6;--purple-glow:rgba(155,89,182,0.3);--rose:#e85577;--rose-glow:rgba(232,85,119,0.3)}
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;background:var(--bg);overflow-x:hidden;position:relative;-webkit-user-select:none;user-select:none}
    .bg-layer{position:fixed;inset:0;z-index:0;overflow:hidden}
    .blob{position:absolute;border-radius:50%;filter:blur(100px);opacity:.5;animation:blobFloat 12s ease-in-out infinite alternate}
    .blob-1{width:500px;height:500px;background:radial-gradient(circle,var(--accent) 0%,transparent 70%);top:-10%;left:-8%;animation-duration:14s}
    .blob-2{width:450px;height:450px;background:radial-gradient(circle,var(--teal) 0%,transparent 70%);bottom:-12%;right:-6%;animation-duration:16s;animation-delay:-4s}
    .blob-3{width:350px;height:350px;background:radial-gradient(circle,var(--gold) 0%,transparent 70%);top:50%;left:55%;transform:translate(-50%,-50%);animation-duration:18s;animation-delay:-8s;opacity:.3}
    @keyframes blobFloat{0%{transform:translate(0,0) scale(1)}33%{transform:translate(60px,-40px) scale(1.1)}66%{transform:translate(-30px,50px) scale(.95)}100%{transform:translate(40px,20px) scale(1.05)}}
    .grid-overlay{position:fixed;inset:0;z-index:1;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:.4;animation:gridShift 20s linear infinite}
    @keyframes gridShift{0%{transform:translate(0,0)}100%{transform:translate(60px,60px)}}
    .noise-overlay{position:fixed;inset:0;z-index:2;opacity:.03;pointer-events:none;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
    .particles{position:fixed;inset:0;z-index:3;pointer-events:none}
    .particle{position:absolute;width:3px;height:3px;border-radius:50%;background:var(--fg);opacity:0;animation:particleRise linear infinite}
    @keyframes particleRise{0%{opacity:0;transform:translateY(0) scale(.5)}15%{opacity:.6}85%{opacity:.3}100%{opacity:0;transform:translateY(-100vh) scale(0)}}
    .main-container{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:44px}
    .main-container.hidden{display:none}
    .login-overlay{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center}
    .login-overlay.hidden{display:none}
    .login-box{width:340px;max-width:90vw;background:rgba(22,22,30,.96);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:32px 28px;backdrop-filter:blur(20px);display:flex;flex-direction:column;gap:18px;animation:popIn .4s cubic-bezier(.25,.46,.45,.94)}
    @keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
    .login-title{text-align:center;font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;color:var(--fg)}
    .login-title i{color:var(--gold);margin-right:6px}
    .login-input{padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.9rem;outline:none;transition:border-color .25s,box-shadow .25s}
    .login-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
    .login-input::placeholder{color:var(--muted)}
    .login-btn{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--gold),#b8882e);color:#fff;font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .25s;letter-spacing:.5px}
    .login-btn:hover{box-shadow:0 4px 20px var(--gold-glow);transform:translateY(-1px)}
    .login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
    .login-error{font-size:.75rem;color:var(--accent);min-height:16px;text-align:center}
    .auth-overlay{position:fixed;inset:0;z-index:160;display:none;align-items:center;justify-content:center}
    .auth-overlay.active{display:flex}
    .auth-label{font-size:.75rem;color:var(--muted);font-family:'Space Grotesk',sans-serif;margin-bottom:-10px}
    .logout-btn{position:fixed;top:16px;right:16px;z-index:100;width:40px;height:40px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(22,22,30,.8);backdrop-filter:blur(10px);color:var(--fg);font-size:1rem;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
    .logout-btn:hover{background:rgba(255,77,77,.15);border-color:rgba(255,77,77,.3);color:#ff6b6b}
    .logout-btn.hidden{display:none}
    .title-section{text-align:center;animation:fadeSlideUp 1s ease-out both}
    .title-section h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:700;color:var(--fg);letter-spacing:-1px;line-height:1.1}
    .title-section p{margin-top:12px;color:var(--muted);font-size:1rem;font-weight:400;letter-spacing:.3px}
    @keyframes fadeSlideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    .btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;animation:fadeSlideUp 1s ease-out .2s both;width:100%;max-width:560px}
    .doc-btn{display:flex;align-items:center;gap:12px;padding:16px 24px;border:1px solid var(--border);border-radius:14px;background:var(--card);backdrop-filter:blur(16px);color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:500;cursor:pointer;position:relative;overflow:hidden;transition:all .35s cubic-bezier(.25,.46,.45,.94);touch-action:manipulation;-webkit-tap-highlight-color:transparent}
    .doc-btn::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .35s;border-radius:inherit;pointer-events:none}
    .doc-btn .icon-wrap{display:flex;align-items:center;justify-content:center;width:42px;height:42px;min-width:42px;border-radius:10px;font-size:1.1rem;transition:transform .35s,box-shadow .35s;position:relative;z-index:1}
    .doc-btn .btn-text{display:flex;flex-direction:column;gap:2px;position:relative;z-index:1}
    .doc-btn .btn-text .label{font-size:.95rem;font-weight:600;line-height:1.2}
    .doc-btn .badge{display:none !important;}
    .btn-view1 .icon-wrap{background:linear-gradient(135deg,var(--teal),#1a9e80);color:#fff;box-shadow:0 4px 16px var(--teal-glow)}
    .btn-view1:hover{border-color:var(--teal);box-shadow:0 0 30px var(--teal-glow),0 8px 32px rgba(0,0,0,.3);transform:translateY(-3px)}
    .btn-view1:hover .icon-wrap{transform:scale(1.1) rotate(-5deg);box-shadow:0 6px 24px var(--teal-glow)}
    .btn-view2 .icon-wrap{background:linear-gradient(135deg,var(--sky),#2b8ac4);color:#fff;box-shadow:0 4px 16px var(--sky-glow)}
    .btn-view2:hover{border-color:var(--sky);box-shadow:0 0 30px var(--sky-glow),0 8px 32px rgba(0,0,0,.3);transform:translateY(-3px)}
    .btn-view2:hover .icon-wrap{transform:scale(1.1) rotate(-5deg);box-shadow:0 6px 24px var(--sky-glow)}
    .btn-view3 .icon-wrap{background:linear-gradient(135deg,var(--purple),#7d3c98);color:#fff;box-shadow:0 4px 16px var(--purple-glow)}
    .btn-view3:hover{border-color:var(--purple);box-shadow:0 0 30px var(--purple-glow),0 8px 32px rgba(0,0,0,.3);transform:translateY(-3px)}
    .btn-view3:hover .icon-wrap{transform:scale(1.1) rotate(-5deg);box-shadow:0 6px 24px var(--purple-glow)}
    .btn-view4 .icon-wrap{background:linear-gradient(135deg,var(--rose),#c23a55);color:#fff;box-shadow:0 4px 16px var(--rose-glow)}
    .btn-view4:hover{border-color:var(--rose);box-shadow:0 0 30px var(--rose-glow),0 8px 32px rgba(0,0,0,.3);transform:translateY(-3px)}
    .btn-view4:hover .icon-wrap{transform:scale(1.1) rotate(-5deg);box-shadow:0 6px 24px var(--rose-glow)}
    .btn-add2 .icon-wrap{background:linear-gradient(135deg,var(--gold),#b8882e);color:#fff;box-shadow:0 4px 16px var(--gold-glow)}
    .btn-add2:hover{border-color:var(--gold);box-shadow:0 0 30px var(--gold-glow),0 8px 32px rgba(0,0,0,.3);transform:translateY(-3px)}
    .btn-add2:hover .icon-wrap{transform:scale(1.1) rotate(5deg);box-shadow:0 6px 24px var(--gold-glow)}
    .doc-btn:active{transform:translateY(-1px) scale(.98)}
    .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.2);transform:scale(0);animation:rippleAnim .6s ease-out forwards;pointer-events:none}
    @keyframes rippleAnim{to{transform:scale(4);opacity:0}}
    .sub-choice{display:none;flex-direction:column;gap:12px;animation:fadeSlideUp .35s ease-out both;grid-column:1/-1}
    .sub-choice.visible{display:flex}
    .sub-choice-row{display:flex;gap:12px}
    .sub-btn{display:flex;align-items:center;gap:10px;padding:14px 20px;border:1px solid var(--border);border-radius:12px;background:var(--card);backdrop-filter:blur(16px);color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .3s ease;flex:1}
    .sub-btn:hover{transform:translateY(-2px)}
    .sub-btn .sub-icon{display:flex;align-items:center;justify-content:center;width:36px;height:36px;min-width:36px;border-radius:8px;font-size:.95rem}
    .sub-btn.choose-file .sub-icon{background:linear-gradient(135deg,var(--gold),#b8882e);color:#fff}
    .sub-btn.choose-file:hover{border-color:var(--gold);box-shadow:0 0 20px var(--gold-glow)}
    .sub-btn.camera-shot .sub-icon{background:linear-gradient(135deg,var(--accent),#c23a25);color:#fff}
    .sub-btn.camera-shot:hover{border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow)}
    .back-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:.75rem;cursor:pointer;transition:all .25s;align-self:flex-start}
    .back-btn:hover{color:var(--fg);border-color:rgba(255,255,255,.15)}
    .overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;backdrop-filter:blur(12px);z-index:105}
    .overlay.active{display:flex}
    .overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,.8);animation:overlayIntro .35s ease-out both}
    @keyframes overlayIntro{from{opacity:0}to{opacity:1}}
    @keyframes boxIntro{from{opacity:0;transform:scale(.92) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .anim-box{position:relative;z-index:1;animation:boxIntro .4s cubic-bezier(.22,1,.36,1) both}
    .doc-table tbody tr{animation:rowIntro .35s ease-out both}
    @keyframes rowIntro{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
    .camera-overlay{position:fixed;inset:0;z-index:250;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center}
    .camera-overlay.active{display:flex}
    .camera-overlay video{width:100%;height:100%;object-fit:cover}
    .camera-controls{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);display:flex;gap:30px;align-items:center}
    .cam-btn{width:56px;height:56px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:rgba(0,0,0,.4);backdrop-filter:blur(8px);color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s}
    .cam-btn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.5);transform:scale(1.1)}
    .cam-btn.close-cam{border-color:#ff4d4d;color:#ff4d4d}.cam-btn.close-cam:hover{background:rgba(255,77,77,.2)}
    .cam-btn.capture{width:70px;height:70px;border-color:#fff;border-width:3px;font-size:1.4rem}.cam-btn.capture:hover{background:rgba(255,255,255,.2)}
    .flash{position:fixed;inset:0;background:#fff;z-index:260;opacity:0;pointer-events:none}
    .flash.fire{animation:flashAnim .4s ease-out}
    @keyframes flashAnim{0%{opacity:.9}100%{opacity:0}}
    @keyframes imgIntro{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
    @keyframes imgOutro{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.85)}}
    .preview-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:100%;max-width:90vw}
    .preview-stage{position:relative;width:100%;display:flex;justify-content:center;min-height:200px}
    .preview-content img{max-width:80vw;max-height:55vh;border-radius:12px;border:2px solid rgba(255,255,255,.1);box-shadow:0 20px 60px rgba(0,0,0,.5);animation:imgIntro .45s cubic-bezier(.22,1,.36,1) both;object-fit:contain;cursor:crosshair}
    .preview-label{margin-top:16px;color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.9rem;opacity:.7}
    .preview-actions{display:flex;gap:12px;margin-top:14px}
    .preview-btn{padding:10px 20px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:8px}
    .preview-btn:hover{background:rgba(255,255,255,.15)}
    .preview-btn.edit-btn{border-color:var(--sky);color:var(--sky)}.preview-btn.edit-btn:hover{background:rgba(61,170,232,.15);border-color:var(--sky);color:var(--sky)}
    .preview-btn.next-btn{background:linear-gradient(135deg,var(--gold),#b8882e);border-color:var(--gold);color:#fff}.preview-btn.next-btn:hover{box-shadow:0 0 20px var(--gold-glow);transform:translateY(-2px)}
    .save-box{width:340px;max-width:90vw;background:rgba(22,22,30,.95);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:28px;backdrop-filter:blur(20px);display:flex;flex-direction:column;gap:20px;max-height:90vh;overflow-y:auto}
    .save-box-title{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;color:var(--fg);display:flex;align-items:center;gap:10px}
    .save-box-title i{color:var(--gold)}
    .input-group{display:flex;flex-direction:column;gap:6px}
    .input-group label{font-size:.75rem;font-weight:500;color:var(--muted);letter-spacing:.8px;text-transform:uppercase}
    .input-group input{padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.9rem;outline:none;transition:border-color .25s,box-shadow .25s}
    .input-group input::placeholder{color:var(--muted);opacity:.6}
    .input-group input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
    .error-msg{font-size:.72rem;color:var(--accent);min-height:16px}
    .class-group{display:flex;flex-direction:column;gap:6px}
    .class-group label{font-size:.75rem;font-weight:500;color:var(--muted);letter-spacing:.8px;text-transform:uppercase}
    .class-options{display:flex;flex-direction:column;gap:8px}
    .class-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .25s}
    .class-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--muted);transition:all .25s;flex-shrink:0}
    .class-btn:hover{border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.03)}
    .class-btn.selected .class-dot{background:var(--gold);border-color:var(--gold)}
    .class-btn.c1 .class-dot{border-color:var(--teal)}.class-btn.c1.selected{border-color:var(--teal);background:rgba(46,196,162,.08)}.class-btn.c1.selected .class-dot{background:var(--teal);border-color:var(--teal)}
    .class-btn.c2 .class-dot{border-color:var(--sky)}.class-btn.c2.selected{border-color:var(--sky);background:rgba(61,170,232,.08)}.class-btn.c2.selected .class-dot{background:var(--sky);border-color:var(--sky)}
    .class-btn.c3 .class-dot{border-color:var(--purple)}.class-btn.c3.selected{border-color:var(--purple);background:rgba(155,89,182,.08)}.class-btn.c3.selected .class-dot{background:var(--purple);border-color:var(--purple)}
    .class-btn.c4 .class-dot{border-color:var(--rose)}.class-btn.c4.selected{border-color:var(--rose);background:rgba(232,85,119,.08)}.class-btn.c4.selected .class-dot{background:var(--rose);border-color:var(--rose)}
    .finished-btn{padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--gold),#b8882e);color:#fff;font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:8px}
    .finished-btn:hover{box-shadow:0 6px 24px var(--gold-glow);transform:translateY(-2px)}
    .finished-btn:active{transform:translateY(0) scale(.98)}
    .finished-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
    .table-box{width:440px;max-width:92vw;max-height:80vh;background:rgba(22,22,30,.96);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:24px;backdrop-filter:blur(20px);display:flex;flex-direction:column;gap:16px;overflow:hidden}
    .table-header{display:flex;align-items:center;justify-content:space-between;min-height:40px}
    .header-left{position:relative;display:flex;align-items:center;flex:1;overflow:hidden;height:40px}
    .table-title,.select-bar{position:absolute;left:0;right:0;top:0;bottom:0;display:flex;align-items:center;gap:10px;transition:opacity .3s,transform .3s;white-space:nowrap;padding-right:10px}
    .table-title{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;color:var(--fg);opacity:1;transform:translateY(0);pointer-events:auto}
    .table-title.hidden{opacity:0;transform:translateY(-12px);pointer-events:none}
    .select-bar{opacity:0;transform:translateY(12px);pointer-events:none;gap:8px;flex-wrap:nowrap}
    .select-bar.visible{opacity:1;transform:translateY(0);pointer-events:auto}
    .doc-count-icon{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;border-radius:7px;padding:0 6px;color:#fff;font-size:.75rem;font-weight:700;font-family:'Space Grotesk',sans-serif;transition:background .3s;flex-shrink:0}
    .table-close{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;flex-shrink:0}
    .table-close:hover{color:var(--fg);border-color:rgba(255,255,255,.2)}
    .search-icon-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;flex-shrink:0}
    .search-icon-btn:hover{color:var(--fg);border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.04)}
    .search-input{display:none;padding:5px 10px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.82rem;outline:none;flex:1;min-width:0;transition:border-color .25s,box-shadow .25s}
    .search-input:focus{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-glow)}
    .search-input::placeholder{color:var(--muted);opacity:.5}
    .search-clear-btn{display:none;width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.7rem;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;transition:all .25s}
    .search-clear-btn:hover{color:var(--fg)}
    #tableTitle.search-active .search-icon-btn{display:none}
    #tableTitle.search-active .search-input{display:block}
    #tableTitle.search-active .search-clear-btn{display:flex}

    .upload-spinner{position:relative;width:70px;height:70px;margin:0 auto 20px}
    .spinner-ring{position:absolute;inset:0;border-radius:50%;border:3px solid transparent;border-top-color:var(--accent);animation:spinRing 1.2s cubic-bezier(.5,0,.5,1) infinite}
    .spinner-ring:nth-child(2){inset:8px;border-top-color:var(--teal);animation-duration:1.6s;animation-direction:reverse}
    .spinner-ring:nth-child(3){inset:16px;border-top-color:var(--gold);animation-duration:2s}
    @keyframes spinRing{to{transform:rotate(360deg)}}
    .upload-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:var(--fg);animation:pulseIcon 1.5s ease-in-out infinite}
    @keyframes pulseIcon{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
    .upload-text{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:600;color:var(--fg);margin-bottom:4px}
    .upload-sub{font-size:.78rem;color:var(--muted);margin-bottom:10px}
    .upload-offline-note{font-size:.78rem;color:var(--gold);display:flex;align-items:center;gap:6px;justify-content:center;margin-top:8px}
    .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);padding:14px 28px;border-radius:12px;font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:500;color:var(--fg);background:rgba(30,30,38,.9);backdrop-filter:blur(12px);border:1px solid var(--border);z-index:999;opacity:0;transition:all .4s cubic-bezier(.25,.46,.45,.94);pointer-events:none;white-space:nowrap}

    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-radius:50%;border-top-color:#fff;animation:spin .8s ease-in-out infinite;margin-right:8px}
    @keyframes spin{to{transform:rotate(360deg)}}

  <button class="logout-btn hidden" id="logoutBtn" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></button>

  <main class="main-container hidden" id="mainContainer">
    <section class="title-section"><h1>የሐመረ-ኖኅ ሰንበት ት/ቤት የተማሪዎች <span style="color:#fff">ሰነድ</span> መያዣ ድህረ ገፅ</h1></section>
    <div class="btn-grid">
      <button class="doc-btn btn-view1" id="btnView1"><div class="icon-wrap"><i class="fa-solid fa-folder-open"></i></div><div class="btn-text"><span class="label">የህፃናት</span></div></button>

  <input type="file" id="fileInput" accept="image/*" style="display:none">
  <input type="file" id="addImgFileInput" accept="image/*" style="display:none">

  <div class="overlay save-overlay" id="saveOverlay"><div class="overlay-bg"></div><div class="anim-box save-box"><div class="save-box-title"><i class="fa-solid fa-floppy-disk"></i> Save Document</div><div class="input-group"><label for="docNameInput">Image Name</label><input type="text" id="docNameInput" placeholder="Enter image name..."><div class="error-msg" id="nameError"></div></div><div class="input-group"><label for="userNameInput">Your Name</label><input type="text" id="userNameInput" placeholder="Enter your name..."><div class="error-msg" id="userError"></div></div><div class="class-group"><label>Choose Class</label><div class="class-options"><button class="class-btn c1" data-class="view1"><span class="class-dot"></span><i class="fa-solid fa-folder-open" style="color:var(--teal);font-size:.85rem"></i> የህፃናት</button><button class="class-btn c2" data-class="view2"><span class="class-dot"></span><i class="fa-solid fa-folder-open" style="color:var(--sky);font-size:.85rem"></i> የታዳጊ</button><button class="class-btn c3" data-class="view3"><span class="class-dot"></span><i class="fa-solid fa-folder-open" style="color:var(--purple);font-size:.85rem"></i> የማእከላውያን</button><button class="class-btn c4" data-class="view4"><span class="class-dot"></span><i class="fa-solid fa-folder-open" style="color:var(--rose);font-size:.85rem"></i> የወጣቶች</button></div></div><button class="finished-btn" id="finishedBtn" disabled><i class="fa-solid fa-check"></i> Finished</button></div></div>

  <div class="overlay table-overlay" id="tableOverlay"><div class="overlay-bg"></div><div class="anim-box table-box"><div class="table-header"><div class="header-left"><div class="table-title" id="tableTitle"><span class="doc-count-icon" id="tableCountIcon">0</span><button class="search-icon-btn" id="searchIconBtn" title="Search names"><i class="fa-solid fa-magnifying-glass"></i></button><input type="text" class="search-input" id="searchInput" placeholder="Search name..."><button class="search-clear-btn" id="searchClearBtn" title="Clear search"><i class="fa-solid fa-xmark"></i></button></div><div class="select-bar" id="selectBar"><button class="sel-btn" id="selectAllBtn"><i class="fa-solid fa-check-double"></i> All</button><button class="sel-btn move-btn" id="moveBtn" disabled><i class="fa-solid fa-arrows-up-down-left-right"></i> Move</button><button class="sel-btn delete-sel-btn" id="deleteSelBtn" disabled><i class="fa-solid fa-trash-can"></i> Delete</button><button class="sel-btn exit-btn" id="exitSelectBtn"><i class="fa-solid fa-xmark"></i> Exit</button><span class="sel-count"><i class="fa-solid fa-circle-info"></i> <span id="selectCount">0</span></span></div></div><button class="table-close" id="tableCloseBtn"><i class="fa-solid fa-xmark"></i></button></div><div class="table-wrap"><table class="doc-table" id="docTable"><thead><tr><th class="col-check"></th><th>#</th><th>Name</th></tr></thead><tbody id="tableBody"></tbody></table></div></div></div>

  <div class="overlay detail-overlay" id="detailOverlay"><div class="overlay-bg"></div><div class="anim-box detail-box"><div class="detail-header"><div class="detail-title"><i class="fa-solid fa-images"></i> Image Preview</div><div class="detail-header-right"><button class="add-img-btn" id="addImgBtn"><i class="fa-solid fa-plus"></i> Add Image</button><button class="detail-close" id="detailCloseBtn"><i class="fa-solid fa-xmark"></i></button></div></div><div class="detail-images" id="detailImages"></div></div></div>

  <div class="overlay" id="addImgOverlay" style="z-index:145"><div class="overlay-bg"></div><div class="anim-box addimg-box"><div class="addimg-title"><i class="fa-solid fa-plus-circle"></i> Add Image</div><div id="addImgStep1" class="addimg-row"><button class="addimg-opt" id="addImgFileBtn"><i class="fa-solid fa-folder-open" style="color:var(--gold)"></i> Choose File</button><button class="addimg-opt" id="addImgCamBtn"><i class="fa-solid fa-camera" style="color:var(--accent)"></i> Camera</button></div><div id="addImgStep2" class="addimg-step2"><div class="preview-stage" id="addImgStage"><img class="addimg-preview" id="addImgPreview" src="" alt="New image"></div><div class="preview-actions" style="width:80vw; justify-content:center"><button class="preview-btn edit-btn" id="addImgEditBtn"><i class="fa-solid fa-crop-simple"></i> Edit</button><button class="preview-btn next-btn" id="addImgNextBtn"><i class="fa-solid fa-arrow-right"></i> Next</button></div></div><div id="addImgStep3" class="addimg-step2"><div class="addimg-thumb-row"><img class="addimg-thumb" id="addImgThumb" src="" alt="Preview"><span class="addimg-thumb-label">Name this image</span></div><div class="input-group"><label for="addImgNameInput">Image Name</label><input type="text" id="addImgNameInput" placeholder="Enter image name..."><div class="error-msg" id="addImgNameError"></div></div><button class="finished-btn" id="addImgSaveBtn" disabled><i class="fa-solid fa-check"></i> Save Image</button></div><button class="addimg-cancel" id="addImgCancelBtn">Cancel</button></div></div>

  <div class="overlay" id="moveOverlay" style="z-index:130"><div class="overlay-bg"></div><div class="anim-box popup-box"><div class="popup-title"><i class="fa-solid fa-arrows-up-down-left-right"></i> Move To</div><div id="moveOptions" style="display:flex;flex-direction:column;gap:8px"></div><button class="login-btn" id="moveCancelBtn" style="background:transparent;border:1px solid var(--border);color:var(--muted)">Cancel</button></div></div>

  <div class="upload-overlay" id="uploadOverlay" style="z-index:200"><div class="overlay-bg"></div><div class="upload-box"><div class="upload-spinner"><div class="spinner-ring"></div><div class="spinner-ring"></div><div class="spinner-ring"></div><i class="fa-solid fa-cloud-arrow-up upload-icon"></i></div><div class="upload-text" id="uploadText">Uploading...</div><div class="upload-sub" id="uploadSub">Please wait</div><div class="upload-offline-note" id="uploadOfflineNote" style="display:none"><i class="fa-solid fa-wifi"></i> Offline - saved locally, will sync when online</div></div></div>

  <div class="toast" id="toast"></div>
  <canvas id="captureCanvas" style="display:none"></canvas>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

  <script>
    // --- 1. ፋይርቤዝ ኮንፊግሬሽን ---
    const firebaseConfig = {
      apiKey: "AIzaSyClCHIj3vJ4MGAm3xkwablROflC-SBq6dw",
      authDomain: "file-holder-f7af0.firebaseapp.com",
      databaseURL: "https://file-holder-f7af0-default-rtdb.firebaseio.com",
      projectId: "file-holder-f7af0",
      storageBucket: "file-holder-f7af0.firebasestorage.app",
      messagingSenderId: "305572027762",
      appId: "1:305572027762:web:26100ee227d3de8224d1eb",
      measurementId: "G-WRVZQ8BQ8Y"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    // --- 2. የተጠቃሚ አዝራር እና የፋይርቤዝ መስተዋት ---
    const ALLOWED_UID = "ZbDjXoOfSFQkYsVATKrPyN0xXIr1";
    const dbRef = db.ref('users/' + ALLOWED_UID);
    
    let currentUid = null;
    let currentUser = null;
    let activeView = null;
    let selectMode = false;
    let selectedIds = new Set();
    let currentProcessedImage = null;
    let targetClass = null;
    let currentDetailId = null;
    let currentDetailView = null;
    let newExtraImg = null;
    let authCallback = null;
    let isOnline = navigator.onLine;
    let stream = null;

    // --- 3. DOM አካላት ---
    const loginOverlay = document.getElementById('loginOverlay');
    const mainContainer = document.getElementById('mainContainer');
    const logoutBtn = document.getElementById('logoutBtn');
    const loginUser = document.getElementById('loginUser');
    const loginPass = document.getElementById('loginPass');
    const loginError = document.getElementById('loginError');
    const loginBtn = document.getElementById('loginBtn');
    const authOverlay = document.getElementById('authOverlay');
    const authUser = document.getElementById('authUser');
    const authPass = document.getElementById('authPass');
    const authError = document.getElementById('authError');
    const authBtn = document.getElementById('authBtn');
    const authCancel = document.getElementById('authCancel');
    const uploadOverlay = document.getElementById('uploadOverlay');
    const uploadText = document.getElementById('uploadText');
    const uploadSub = document.getElementById('uploadSub');
    const uploadOfflineNote = document.getElementById('uploadOfflineNote');
    const toastEl = document.getElementById('toast');
    const fileInput = document.getElementById('fileInput');
    const cameraOverlay = document.getElementById('cameraOverlay');
    const cameraVideo = document.getElementById('cameraVideo');
    const captureCanvas = document.getElementById('captureCanvas');
    const tableOverlay = document.getElementById('tableOverlay');
    const tableBody = document.getElementById('tableBody');
    const tableTitle = document.getElementById('tableTitle');
    const tableCountIcon = document.getElementById('tableCountIcon');
    const selectBar = document.getElementById('selectBar');
    const searchInput = document.getElementById('searchInput');
    const detailOverlay = document.getElementById('detailOverlay');
    const detailImages = document.getElementById('detailImages');
    const addImgOverlay = document.getElementById('addImgOverlay');
    const addImgFileInput = document.getElementById('addImgFileInput');

    const viewMap = { 
      view1: { title: 'የህፃናት', color: 'var(--teal)' }, 
      view2: { title: 'የታዳጊ', color: 'var(--sky)' },
      view3: { title: 'የማእከላውያን', color: 'var(--purple)' }, 
      view4: { title: 'የወጣቶች', color: 'var(--rose)' } 
    };

    // --- 4. ኢንተርኔት እና ቅንብሮች ---
    window.addEventListener('online', () => { isOnline = true; showToast('<i class="fa-solid fa-wifi"></i> Back online!', 2000); syncOfflineData(); });
    window.addEventListener('offline', () => { isOnline = false; showToast('<i class="fa-solid fa-wifi-slash"></i> You are offline', 3000); });

    let toastTimer;
    function showToast(msg, dur = 2500) { clearTimeout(toastTimer); toastEl.innerHTML = msg; toastEl.classList.add('show'); toastTimer = setTimeout(() => toastEl.classList.remove('show'), dur); }

    function addRipple(e, el) { const ripple = document.createElement('span'); ripple.className = 'ripple'; const rect = el.getBoundingClientRect(); ripple.style.left = (e.clientX - rect.left) + 'px'; ripple.style.top = (e.clientY - rect.top) + 'px'; el.appendChild(ripple); setTimeout(() => ripple.remove(), 600); }

    // --- 5. አውቶሪዛትዮን (Login System) ---
    function handleLogin() {
      const email = 'fileholder@gmail.com'; const pass = loginPass.value;
      if (!pass) { loginError.textContent = 'ፓስወርድ ያስገቡ'; return; }
      loginBtn.disabled = true; loginBtn.innerHTML = '<span class="spinner"></span> Logging in...'; loginError.textContent = "";
      auth.signInWithEmailAndPassword(email, pass)
        .then((userCredential) => {
          currentUid = userCredential.user.uid;
          if (currentUid !== ALLOWED_UID) { auth.signOut(); throw new Error("NOT_ALLOWED"); }
          currentUser = email; loginSuccess();
        })
        .catch((error) => {
          loginBtn.disabled = false; loginBtn.innerHTML = 'Login';
          loginError.textContent = error.message === "NOT_ALLOWED" ? "ይህ መለያ ፈቃድ የለውም!" : "ኢሜይል ወይም ፓስወርድ ትክክል አይደለም!";
        });
    }

    function loginSuccess() {
      loginOverlay.classList.add('hidden'); mainContainer.classList.remove('hidden'); logoutBtn.classList.remove('hidden');
      loginBtn.disabled = false; loginBtn.innerHTML = 'Login';
      loginUser.value = ''; loginPass.value = ''; loginError.textContent = ''; initApp();
    }

    function logout() { auth.signOut(); localStorage.removeItem('auth'); currentUid = null; currentUser = null; activeView = null; mainContainer.classList.add('hidden'); logoutBtn.classList.add('hidden'); loginOverlay.classList.remove('hidden'); }
    
    loginBtn.addEventListener('click', handleLogin);
    loginPass.addEventListener('keyup', e => { if (e.key === 'Enter') handleLogin(); });
    logoutBtn.addEventListener('click', logout);

    // ራስ-ሰር ማረጋገጫ (Auto-login check)
    auth.onAuthStateChanged(user => {
      if (user && user.uid === ALLOWED_UID) {
        currentUid = user.uid; currentUser = user.email; loginSuccess();
      }
    });

    // --- 6. Auth Check (ለማጥፋት/ለማንቀሳቀስ) ---
    function requireAuth(callback) {
      authCallback = callback; authUser.value = ''; authPass.value = ''; authError.textContent = ''; authOverlay.classList.add('active');
    }

    authBtn.addEventListener('click', () => {
      const email = 'fileholder@gmail.com'; const pass = authPass.value;
      if (!pass) { authError.textContent = "ፓስወርድ ያስገቡ"; return; }
      authBtn.disabled = true; authBtn.innerHTML = '<span class="spinner"></span> Checking...';
      auth.signInWithEmailAndPassword(email, pass)
        .then((cred) => {
          if (cred.user.uid === ALLOWED_UID) { authOverlay.classList.remove('active'); if (authCallback) authCallback(); }
          else { authError.textContent = "ፈቃድ የለም!"; }
          authBtn.disabled = false; authBtn.innerHTML = 'Confirm';
        })
        .catch(() => { authError.textContent = "ፓስወርድ ትክክል አይደለም"; authBtn.disabled = false; authBtn.innerHTML = 'Confirm'; });
    });
    authCancel.addEventListener('click', () => { authOverlay.classList.remove('active'); authBtn.disabled = false; authBtn.innerHTML = 'Confirm'; });

    // --- 7. App Logic & Database ---
    function initApp() {
      dbRef.on('value', snap => {
        if (!snap.exists()) return;
        const data = snap.val();
        Object.keys(viewMap).forEach(key => {
          const btn = document.getElementById('btn' + key.charAt(0).toUpperCase() + key.slice(1));
          const count = data[key] ? Object.keys(data[key]).length : 0;
          let badge = btn.querySelector('.badge');
          if (!badge) { badge = document.createElement('span'); badge.className = 'badge'; btn.appendChild(badge); }
          badge.textContent = count > 0 ? count : '';
          badge.style.cssText = count > 0 ? 'display:flex;position:absolute;top:-8px;right:-8px;background:var(--accent);color:#fff;border-radius:50%;width:20px;height:20px;align-items:center;justify-content:center;font-size:.7rem;font-weight:bold;z-index:2;' : 'display:none';
        });
        if (activeView) renderTable(activeView);
      }, err => showToast('<i class="fa-solid fa-triangle-exclamation"></i> DB Error'));
    }

    // --- 8. Button Clicks ---
    document.querySelectorAll('.doc-btn[id^="btnView"]').forEach(btn => {
      btn.addEventListener('click', function(e) { e.preventDefault(); e.stopPropagation(); openTable(this.id.replace('btn', '').toLowerCase()); addRipple(e, this); }, { passive: false });
    });
    document.getElementById('btnAdd2').addEventListener('click', (e) => { document.getElementById('subChoice').classList.add('visible'); addRipple(e, document.getElementById('btnAdd2')); });
    document.getElementById('backBtn').addEventListener('click', () => document.getElementById('subChoice').classList.remove('visible'));

    // --- 9. File & Camera ---
    document.getElementById('chooseFileBtn').addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => { if (e.target.files[0]) processImageFile(URL.createObjectURL(e.target.files[0])); fileInput.value = ''; });
    document.getElementById('cameraShotBtn').addEventListener('click', openCam);
    document.getElementById('closeCamBtn').addEventListener('click', closeCam);
    document.getElementById('captureBtn').addEventListener('click', takePicture);

    async function openCam() {
      try {
        // የጀርባ ካሜራ ካልተገኘ ማንኛውንም ካሜራ ይጠቀማል
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: "environment" } }, audio: false })
        .catch(() => navigator.mediaDevices.getUserMedia({ video: true, audio: false }));
        cameraVideo.srcObject = stream; cameraOverlay.classList.add('active');
      } catch(e) { showToast('<i class="fa-solid fa-camera-rotate"></i> Camera access denied'); }
    }
    function closeCam() { if(stream) stream.getTracks().forEach(t => t.stop()); stream = null; cameraOverlay.classList.remove('active'); }
    function takePicture() {
      document.getElementById('flash').classList.add('fire');
      captureCanvas.width = cameraVideo.videoWidth; captureCanvas.height = cameraVideo.videoHeight;
      captureCanvas.getContext('2d').drawImage(cameraVideo, 0, 0);
      closeCam();
      processImageFile(captureCanvas.toDataURL('image/jpeg', 0.85));
    }

    // --- 10. Image Processing ---
    function processImageFile(src) {
      const img = document.getElementById('previewImg');
      img.src = src; img.dataset.origSrc = src; img.style.clipPath = ''; img.style.transform = '';
      document.getElementById('previewOverlay').classList.add('active');
      document.getElementById('previewEditBtn').innerHTML = '<i class="fa-solid fa-crop-simple"></i> Edit';
      document.getElementById('previewLabel').textContent = 'Drag to crop area (Edit Mode)';
      
      const nextHandler = () => { currentProcessedImage = img.src; document.getElementById('previewOverlay').classList.remove('active'); document.getElementById('saveOverlay').classList.add('active'); document.getElementById('previewNextBtn').removeEventListener('click', nextHandler); };
      document.getElementById('previewNextBtn').addEventListener('click', nextHandler);
    }

    document.getElementById('previewCloseBtn').addEventListener('click', () => document.getElementById('previewOverlay').classList.remove('active'));
    document.getElementById('previewEditBtn').addEventListener('click', () => {
      const img = document.getElementById('previewImg'); const isEditing = img.style.clipPath !== '';
      img.style.clipPath = isEditing ? '' : 'inset(10% 10% 10% 10%)';
      document.getElementById('previewEditBtn').innerHTML = isEditing ? '<i class="fa-solid fa-crop-simple"></i> Edit' : '<i class="fa-solid fa-check"></i> Done';
      document.getElementById('previewLabel').textContent = isEditing ? 'Drag to crop area (Edit Mode)' : 'Crop applied!';
    });

    // --- 11. Save Flow ---
    const docNameInput = document.getElementById('docNameInput');
    const userNameInput = document.getElementById('userNameInput');
    const finishedBtn = document.getElementById('finishedBtn');

    docNameInput.addEventListener('input', validateSave); userNameInput.addEventListener('input', validateSave);
    document.querySelectorAll('.class-btn').forEach(btn => { btn.addEventListener('click', () => { document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); targetClass = btn.dataset.class; validateSave(); }); });
    function validateSave() { finishedBtn.disabled = !(docNameInput.value.trim() && userNameInput.value.trim() && targetClass); }

    finishedBtn.addEventListener('click', async () => {
      const name = docNameInput.value.trim(); const user = userNameInput.value.trim();
      if (!name || !user || !targetClass) return;
      document.getElementById('saveOverlay').classList.remove('active');
      uploadText.textContent = 'Uploading...'; uploadSub.textContent = 'Compressing image'; uploadOfflineNote.style.display = 'none'; uploadOverlay.classList.add('active');
      try {
        const base64 = await compressImage(currentProcessedImage, 0.6, 1200);
        const entry = { name, user, image: base64, timestamp: Date.now() };
        if (isOnline) { uploadSub.textContent = 'Saving to cloud...'; await dbRef.child(targetClass).push(entry); showToast('<i class="fa-solid fa-check-circle"></i> Saved successfully!'); }
        else { queueOfflinePush(targetClass, entry); uploadOfflineNote.style.display = 'flex'; showToast('<i class="fa-solid fa-wifi-slash"></i> Saved offline'); }
      } catch(e) { showToast('<i class="fa-solid fa-triangle-exclamation"></i> Error saving'); }
      uploadOverlay.classList.remove('active'); docNameInput.value = ''; userNameInput.value = ''; targetClass = null; document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('selected')); finishedBtn.disabled = true; document.getElementById('subChoice').classList.remove('visible');
    });

    function compressImage(src, quality, maxW) {
      return new Promise((res) => { const img = new Image(); img.onload = () => { const canvas = document.createElement('canvas'); let w = img.width, h = img.height; if (w > maxW) { h = (maxW / w) * h; w = maxW; } canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0, 0, w, h); res(canvas.toDataURL('image/jpeg', quality)); }; img.src = src; });
    }

    // --- 12. Table View ---
    function openTable(view) { activeView = view; selectMode = false; selectedIds.clear(); exitSelectMode(); tableOverlay.classList.add('active'); renderTable(view); }

    function renderTable(view) {
      const info = viewMap[view]; tableCountIcon.textContent = '...'; tableCountIcon.style.background = info.color;
      tableTitle.classList.remove('hidden'); selectBar.classList.remove('visible'); tableBody.innerHTML = '';
      dbRef.child(view).once('value', snap => {
        if (!snap.exists()) { tableBody.innerHTML = `<tr><td colspan="3" class="doc-hint"><i class="fa-solid fa-inbox"></i>No documents yet</td></tr>`; tableCountIcon.textContent = '0'; return; }
        const data = snap.val(); const arr = Object.entries(data).sort((a,b) => b[1].timestamp - a[1].timestamp); tableCountIcon.textContent = arr.length;
        arr.forEach(([id, doc], i) => {
          const tr = document.createElement('tr'); tr.dataset.id = id; tr.dataset.view = view;
          tr.innerHTML = `<td class="cell-check"><i class="fa-regular fa-square"></i></td><td class="doc-index">${i + 1}</td><td><div class="name-cell"><span class="doc-name-text">${doc.name}</span><span class="user-name-cell">${doc.user}</span><button class="view-icon-btn" title="View"><i class="fa-solid fa-eye"></i></button></div></td>`;
          tr.addEventListener('click', (e) => { if (selectMode && !e.target.closest('.view-icon-btn')) toggleSelect(tr, id); else if (e.target.closest('.view-icon-btn')) openDetail(view, id, doc); });
          tableBody.appendChild(tr);
        });
      });
    }

    document.getElementById('tableCloseBtn').addEventListener('click', () => tableOverlay.classList.remove('active'));
    document.getElementById('searchIconBtn').addEventListener('click', () => tableTitle.classList.add('search-active'));
    document.getElementById('searchClearBtn').addEventListener('click', () => { searchInput.value = ''; filterTable(); tableTitle.classList.remove('search-active'); });
    searchInput.addEventListener('input', filterTable);
    function filterTable() { const q = searchInput.value.toLowerCase(); document.querySelectorAll('#tableBody tr[data-id]').forEach(tr => { tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none'; }); }
    // Select Mode - activate by tapping the count icon
    tableCountIcon.addEventListener('click', () => {
      selectMode = !selectMode;
      if(!selectMode) { exitSelectMode(); return; }
      selectedIds.clear(); tableOverlay.querySelector('.table-wrap').classList.add('select-mode'); tableTitle.classList.add('hidden'); selectBar.classList.add('visible'); updateSelectUI();
    });
    // Select Mode - also activate by double-tap on table row
    tableBody.addEventListener('dblclick', (e) => {
      if (selectMode) return;
      const tr = e.target.closest('tr[data-id]');
      if (!tr) return;
      selectMode = true; selectedIds.clear(); tableOverlay.querySelector('.table-wrap').classList.add('select-mode'); tableTitle.classList.add('hidden'); selectBar.classList.add('visible'); updateSelectUI();
    });
    document.getElementById('exitSelectBtn').addEventListener('click', exitSelectMode);

    document.getElementById('selectAllBtn').addEventListener('click', () => {
      const allIds = [...document.querySelectorAll('#tableBody tr[data-id]')].map(t => t.dataset.id);
      if (selectedIds.size === allIds.length) selectedIds.clear(); else allIds.forEach(id => selectedIds.add(id));
      document.querySelectorAll('#tableBody tr[data-id]').forEach(tr => { const isChecked = selectedIds.has(tr.dataset.id); tr.classList.toggle('row-selected', isChecked); tr.querySelector('.cell-check i').className = isChecked ? 'fa-solid fa-square-check checked check-anim' : 'fa-regular fa-square'; }); updateSelectUI();
    });

    function toggleSelect(tr, id) { if (selectedIds.has(id)) { selectedIds.delete(id); tr.classList.remove('row-selected'); tr.querySelector('.cell-check i').className = 'fa-regular fa-square'; } else { selectedIds.add(id); tr.classList.add('row-selected'); tr.querySelector('.cell-check i').className = 'fa-solid fa-square-check checked check-anim'; } updateSelectUI(); }
    function updateSelectUI() { document.getElementById('selectCount').textContent = selectedIds.size; document.getElementById('moveBtn').disabled = selectedIds.size === 0; document.getElementById('deleteSelBtn').disabled = selectedIds.size === 0; }

    // Move & Delete Actions
    document.getElementById('moveBtn').addEventListener('click', () => {
      if (selectedIds.size === 0) return; const moveOpts = document.getElementById('moveOptions'); moveOpts.innerHTML = '';
      Object.entries(viewMap).forEach(([key, val]) => {
        if (key === activeView) return; const btn = document.createElement('button'); btn.className = 'move-opt-btn';
        btn.innerHTML = `<span class="move-dot" style="background:${val.color}"></span> ${val.title}`;
        btn.onclick = () => { requireAuth(() => { document.getElementById('moveOverlay').classList.remove('active'); performMove(key); }); document.getElementById('moveOverlay').classList.remove('active'); }; moveOpts.appendChild(btn);
      }); document.getElementById('moveOverlay').classList.add('active');
    });

    async function performMove(targetView) {
      const updates = {}; selectedIds.forEach(id => { dbRef.child(`${activeView}/${id}`).once('value', s => { if(s.exists()) dbRef.child(`${targetView}/${id}`).set(s.val()); }); updates[`${activeView}/${id}`] = null; });
      await dbRef.update(updates); exitSelectMode(); renderTable(activeView); showToast('<i class="fa-solid fa-check"></i> Moved!');
    }

    document.getElementById('deleteSelBtn').addEventListener('click', () => { if (selectedIds.size === 0) return; requireAuth(() => performDelete(selectedIds)); });
    async function performDelete(ids) { const updates = {}; ids.forEach(id => updates[`${activeView}/${id}`] = null); await dbRef.update(updates); exitSelectMode(); renderTable(activeView); showToast('<i class="fa-solid fa-trash"></i> Deleted'); }
    document.getElementById('moveCancelBtn').addEventListener('click', () => document.getElementById('moveOverlay').classList.remove('active'));

    // --- 13. Detail View ---
    function openDetail(view, id, doc) {
      currentDetailId = id; currentDetailView = view; detailImages.innerHTML = '';
      addImageToDetail(doc.image, doc.name, doc.user, id, view);
      if (doc.extraImages) { Object.entries(doc.extraImages).forEach(([exId, exImg]) => addImageToDetail(exImg.image, exImg.name, doc.user, exId, view, true, id)); }
      detailOverlay.classList.add('active');
    }

    function addImageToDetail(src, name, user, id, view, isExtra = false, parentId = null) {
      const item = document.createElement('div'); item.className = 'detail-img-item';
      item.innerHTML = `<div class="detail-img-stage"><img src="${src}" alt="${name}"></div><div class="detail-img-name-block"><div class="detail-img-main-name">${name}</div><div class="detail-img-user-name">${user}</div></div><div class="img-divider"></div><div class="img-actions"><button class="download-btn"><i class="fa-solid fa-download"></i> Download</button><button class="delete-btn"><i class="fa-solid fa-trash-can"></i> Delete</button></div>`;
      item.querySelector('.download-btn').onclick = () => { fetch(src).then(r => r.blob()).then(blob => { const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `${name}.jpg`; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); }); };
      item.querySelector('.delete-btn').onclick = () => { requireAuth(() => { if (isExtra) dbRef.child(`${view}/${parentId}/extraImages/${id}`).remove(); else dbRef.child(`${view}/${id}`).remove(); item.style.animation = 'imgOutro .3s ease forwards'; setTimeout(() => { item.remove(); if(detailImages.children.length === 0) detailOverlay.classList.remove('active'); }, 300); showToast('<i class="fa-solid fa-trash"></i> Deleted'); }); };
      detailImages.appendChild(item);
    }
    document.getElementById('detailCloseBtn').addEventListener('click', () => detailOverlay.classList.remove('active'));

    // --- 14. Add Extra Images ---
    document.getElementById('addImgBtn').addEventListener('click', () => { resetAddImgSteps(); addImgOverlay.classList.add('active'); });
    document.getElementById('addImgCancelBtn').addEventListener('click', () => addImgOverlay.classList.remove('active'));
    document.getElementById('addImgFileBtn').addEventListener('click', () => addImgFileInput.click());
    
    addImgFileInput.addEventListener('change', e => { if (e.target.files[0]) processAddImg(URL.createObjectURL(e.target.files[0])); addImgFileInput.value = ''; });
    
    document.getElementById('addImgCamBtn').addEventListener('click', async () => {
      try {
        let camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: "environment" } }, audio: false }).catch(() => navigator.mediaDevices.getUserMedia({ video: true, audio: false }));
        cameraVideo.srcObject = camStream; cameraOverlay.classList.add('active');
        document.getElementById('captureBtn').onclick = () => {
          document.getElementById('flash').classList.add('fire');
          captureCanvas.width = cameraVideo.videoWidth; captureCanvas.height = cameraVideo.videoHeight;
          captureCanvas.getContext('2d').drawImage(cameraVideo, 0, 0);
          if(camStream) camStream.getTracks().forEach(t => t.stop());
          cameraOverlay.classList.remove('active');
          processAddImg(captureCanvas.toDataURL('image/jpeg', 0.85));
        };
      } catch(e) { showToast('<i class="fa-solid fa-camera-rotate"></i> Camera error'); }
    });

    function resetAddImgSteps() {
      document.getElementById('addImgStep1').style.display = 'flex';
      document.getElementById('addImgStep2').classList.remove('visible');
      document.getElementById('addImgStep3').classList.remove('visible');
      document.getElementById('addImgNameInput').value = '';
      document.getElementById('addImgSaveBtn').disabled = true;
      newExtraImg = null;
    }

    function processAddImg(src) {
      newExtraImg = src;
      document.getElementById('addImgPreview').src = src; document.getElementById('addImgPreview').style.clipPath = '';
      document.getElementById('addImgStep1').style.display = 'none';
      document.getElementById('addImgStep2').classList.add('visible');
      document.getElementById('addImgEditBtn').innerHTML = '<i class="fa-solid fa-crop-simple"></i> Edit';

      const nextHandler = () => {
        document.getElementById('addImgThumb').src = newExtraImg;
        document.getElementById('addImgStep2').classList.remove('visible');
        document.getElementById('addImgStep3').classList.add('visible');
        document.getElementById('addImgNameInput').focus();
        document.getElementById('addImgNextBtn').removeEventListener('click', nextHandler);
      };
      document.getElementById('addImgNextBtn').addEventListener('click', nextHandler);
    }

    document.getElementById('addImgEditBtn').addEventListener('click', () => {
      const img = document.getElementById('addImgPreview'); const isEditing = img.style.clipPath !== '';
      img.style.clipPath = isEditing ? '' : 'inset(10% 10% 10% 10%)';
      document.getElementById('addImgEditBtn').innerHTML = isEditing ? '<i class="fa-solid fa-crop-simple"></i> Edit' : '<i class="fa-solid fa-check"></i> Done';
    });

    document.getElementById('addImgNameInput').addEventListener('input', e => { document.getElementById('addImgSaveBtn').disabled = !e.target.value.trim(); });

    document.getElementById('addImgSaveBtn').addEventListener('click', async () => {
      const name = document.getElementById('addImgNameInput').value.trim();
      if (!name || !newExtraImg || !currentDetailId) return;
      uploadOverlay.classList.add('active'); uploadText.textContent = 'Adding Image...'; uploadSub.textContent = 'Compressing'; uploadOfflineNote.style.display = 'none';
      try {
        const base64 = await compressImage(newExtraImg, 0.6, 1200);
        const entry = { name, image: base64 };
        if (isOnline) { await dbRef.child(`${currentDetailView}/${currentDetailId}/extraImages`).push(entry); showToast('<i class="fa-solid fa-check"></i> Image added!'); }
        else { queueOfflinePush(`${currentDetailView}/${currentDetailId}/extraImages`, entry); uploadOfflineNote.style.display = 'flex'; showToast('<i class="fa-solid fa-wifi-slash"></i> Saved offline'); }
        addImgOverlay.classList.remove('active'); uploadOverlay.classList.remove('active');
        // Refresh detail view
        dbRef.child(`${currentDetailView}/${currentDetailId}`).once('value', s => { if(s.exists()) openDetail(currentDetailView, currentDetailId, s.val()); });
      } catch(e) { showToast('Error adding image'); uploadOverlay.classList.remove('active'); }
    });

    // --- 15. Offline Sync ---
    function queueOfflinePush(path, data) { let q = JSON.parse(localStorage.getItem('offlineQueue') || '[]'); q.push({path, data}); localStorage.setItem('offlineQueue', JSON.stringify(q)); }
    function syncOfflineData() {
      let q = JSON.parse(localStorage.getItem('offlineQueue') || '[]'); if(!q.length) return;
      let successCount = 0;
      const promises = q.map(item => dbRef.child(item.path).push(item.data).then(() => successCount++).catch(()=>{}));
      Promise.all(promises).then(() => {
        if(successCount > 0) { localStorage.removeItem('offlineQueue'); showToast(`<i class="fa-solid fa-cloud-arrow-up"></i> Synced ${successCount} items!`, 3000); }
      });
    }

    // --- 16. Background Particles ---
    const particlesEl = document.getElementById('particles');
    for(let i=0; i<25; i++) { const p = document.createElement('div'); p.className = 'particle'; p.style.left = Math.random()*100+'%'; p.style.bottom = '-10px'; p.style.animationDuration = (Math.random()*10+8)+'s'; p.style.animationDelay = (Math.random()*10)+'s'; p.style.width = (Math.random()*3+1)+'px'; p.style.height = p.style.width; particlesEl.appendChild(p); }

  </script>
</body>
</html>
