<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>የሐመረ-ኖኅ ሰንበት ት/ቤት የተማሪዎች ሰነድ መያዣ ድህረ ገፅ</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root{--bg:#0e0f14;--fg:#f0ece4;--muted:#6b6872;--accent:#e8553d;--accent-glow:rgba(232,85,61,0.35);--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07);--teal:#2ec4a2;--teal-glow:rgba(46,196,162,0.3);--gold:#d4a03c;--gold-glow:rgba(212,160,60,0.3);--sky:#3daae8;--sky-glow:rgba(61,170,232,0.3);--purple:#9b59b6;--purple-glow:rgba(155,89,182,0.3);--rose:#e85577;--rose-glow:rgba(232,85,119,0.3)}
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;background:var(--bg);overflow-x:hidden;position:relative;-webkit-user-select:none;user-select:none}
    .bg-layer{position:fixed;inset:0;z-index:0;overflow:hidden}
    .blob{position:absolute;border-radius:50%;opacity:0;animation:none}
    .blob-1{width:500px;height:500px;background:radial-gradient(circle,var(--accent) 0%,transparent 70%);top:-10%;left:-8%;animation-duration:14s}
    .blob-2{width:450px;height:450px;background:radial-gradient(circle,var(--teal) 0%,transparent 70%);bottom:-12%;right:-6%;animation-duration:16s;animation-delay:-4s}
    .blob-3{width:350px;height:350px;background:radial-gradient(circle,var(--gold) 0%,transparent 70%);top:50%;left:55%;transform:translate(-50%,-50%);animation-duration:18s;animation-delay:-8s;opacity:.3}
    @keyframes blobFloat{0%{transform:translate(0,0) scale(1)}33%{transform:translate(60px,-40px) scale(1.1)}66%{transform:translate(-30px,50px) scale(.95)}100%{transform:translate(40px,20px) scale(1.05)}}
    .grid-overlay{position:fixed;inset:0;z-index:1;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:60px 60px;opacity:.15;animation:none}
    .noise-overlay{display:none}
    .particles{position:fixed;inset:0;z-index:3;pointer-events:none}
    .particle{display:none}
    .main-container{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:44px}
    .main-container.hidden{display:none}
    .login-overlay{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center}
    .login-overlay.hidden{display:none}
    .login-box{width:340px;max-width:90vw;background:rgba(22,22,30,.98);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:32px 28px;display:flex;flex-direction:column;gap:18px;animation:popIn .4s cubic-bezier(.25,.46,.45,.94)}
    @keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
    .login-title{text-align:center;font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;color:var(--fg)}
    .login-title i{color:var(--gold);margin-right:6px}
    .login-input{padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.9rem;outline:none;transition:border-color .25s,box-shadow .25s}
    .login-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
    .login-input::placeholder{color:var(--muted)}
    .login-btn{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--gold),#b8882e);color:#fff;font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .25s;letter-spacing:.5px}
    .login-btn:hover{box-shadow:0 4px 20px var(--gold-glow);transform:translateY(-1px)}
    .login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
    .login-error{font-size:.75rem;color:var(--accent);min-height:16px;text-align:center}
    .auth-overlay{position:fixed;inset:0;z-index:160;display:none;align-items:center;justify-content:center}
    .auth-overlay.active{display:flex}
    .auth-label{font-size:.75rem;color:var(--muted);font-family:'Space Grotesk',sans-serif;margin-bottom:-10px}
    .logout-btn{position:fixed;top:16px;right:16px;z-index:100;width:40px;height:40px;border-radius:10px;border:1px solid rgba(255,255,255,.1);background:rgba(22,22,30,.9);color:var(--fg);font-size:1rem;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
    .logout-btn:hover{background:rgba(255,77,77,.15);border-color:rgba(255,77,77,.3);color:#ff6b6b}
    .logout-btn.hidden{display:none}
    .title-section{text-align:center;animation:fadeSlideUp 1s ease-out both}
    .title-section h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:700;color:var(--fg);letter-spacing:-1px;line-height:1.1}
    .title-section p{margin-top:12px;color:var(--muted);font-size:1rem;font-weight:400;letter-spacing:.3px}
    @keyframes fadeSlideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    .btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;animation:fadeSlideUp 1s ease-out .2s both;width:100%;max-width:560px}
    .doc-btn{display:flex;align-items:center;gap:12px;padding:16px 24px;border:1px solid var(--border);border-radius:14px;background:var(--card);color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:500;cursor:pointer;position:relative;overflow:hidden;transition:all .35s cubic-bezier(.25,.46,.45,.94);touch-action:manipulation;-webkit-tap-highlight-color:transparent}
    .doc-btn::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .35s;border-radius:inherit;pointer-events:none}
    .doc-btn .icon-wrap{display:flex;align-items:center;justify-content:center;width:42px;height:42px;min-width:42px;border-radius:10px;font-size:1.1rem;transition:transform .35s,box-shadow .35s;position:relative;z-index:1}
    .doc-btn .btn-text{display:flex;flex-direction:column;gap:2px;position:relative;z-index:1}
    .doc-btn .btn-text .label{font-size:.95rem;font-weight:600;line-height:1.2}
    .doc-btn .badge{display:none !important;}
    .btn-view1 .icon-wrap{background:linear-gradient(135deg,var(--teal),#1a9e80);color:#fff;box-shadow:0 4px 16px var(--teal-glow)}
    .btn-view1:hover{border-color:var(--teal);box-shadow:0 0 30px var(--teal-glow),0 8px 32px rgba(0,0,0,.3);transform:translateY(-3px)}
    .btn-view1:hover .icon-wrap{transform:scale(1.1) rotate(-5deg);box-shadow:0 6px 24px var(--teal-glow)}
    .btn-view2 .icon-wrap{background:linear-gradient(135deg,var(--sky),#2b8ac4);color:#fff;box-shadow:0 4px 16px var(--sky-glow)}
    .btn-view2:hover{border-color:var(--sky);box-shadow:0 0 30px var(--sky-glow),0 8px 32px rgba(0,0,0,.3);transform:translateY(-3px)}
    .btn-view2:hover .icon-wrap{transform:scale(1.1) rotate(-5deg);box-shadow:0 6px 24px var(--sky-glow)}
    .btn-view3 .icon-wrap{background:linear-gradient(135deg,var(--purple),#7d3c98);color:#fff;box-shadow:0 4px 16px var(--purple-glow)}
    .btn-view3:hover{border-color:var(--purple);box-shadow:0 0 30px var(--purple-glow),0 8px 32px rgba(0,0,0,.3);transform:translateY(-3px)}
    .btn-view3:hover .icon-wrap{transform:scale(1.1) rotate(-5deg);box-shadow:0 6px 24px var(--purple-glow)}
    .btn-view4 .icon-wrap{background:linear-gradient(135deg,var(--rose),#c23a55);color:#fff;box-shadow:0 4px 16px var(--rose-glow)}
    .btn-view4:hover{border-color:var(--rose);box-shadow:0 0 30px var(--rose-glow),0 8px 32px rgba(0,0,0,.3);transform:translateY(-3px)}
    .btn-view4:hover .icon-wrap{transform:scale(1.1) rotate(-5deg);box-shadow:0 6px 24px var(--rose-glow)}
    .btn-add2 .icon-wrap{background:linear-gradient(135deg,var(--gold),#b8882e);color:#fff;box-shadow:0 4px 16px var(--gold-glow)}
    .btn-add2:hover{border-color:var(--gold);box-shadow:0 0 30px var(--gold-glow),0 8px 32px rgba(0,0,0,.3);transform:translateY(-3px)}
    .btn-add2:hover .icon-wrap{transform:scale(1.1) rotate(5deg);box-shadow:0 6px 24px var(--gold-glow)}
    .doc-btn:active{transform:translateY(-1px) scale(.98)}
    .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.2);transform:scale(0);animation:rippleAnim .6s ease-out forwards;pointer-events:none}
    @keyframes rippleAnim{to{transform:scale(4);opacity:0}}
    .sub-choice{display:none;flex-direction:column;gap:12px;animation:fadeSlideUp .35s ease-out both;grid-column:1/-1}
    .sub-choice.visible{display:flex}
    .sub-choice-row{display:flex;gap:12px}
    .sub-btn{display:flex;align-items:center;gap:10px;padding:14px 20px;border:1px solid var(--border);border-radius:12px;background:var(--card);color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .3s ease;flex:1}
    .sub-btn:hover{transform:translateY(-2px)}
    .sub-btn .sub-icon{display:flex;align-items:center;justify-content:center;width:36px;height:36px;min-width:36px;border-radius:8px;font-size:.95rem}
    .sub-btn.choose-file .sub-icon{background:linear-gradient(135deg,var(--gold),#b8882e);color:#fff}
    .sub-btn.choose-file:hover{border-color:var(--gold);box-shadow:0 0 20px var(--gold-glow)}
    .sub-btn.camera-shot .sub-icon{background:linear-gradient(135deg,var(--accent),#c23a25);color:#fff}
    .sub-btn.camera-shot:hover{border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow)}
    .back-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:.75rem;cursor:pointer;transition:all .25s;align-self:flex-start}
    .back-btn:hover{color:var(--fg);border-color:rgba(255,255,255,.15)}
    .overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.7);z-index:105}
    .overlay.active{display:flex}
    .overlay-bg{position:absolute;inset:0;background:rgba(0,0,0,.8);animation:overlayIntro .35s ease-out both}
    @keyframes overlayIntro{from{opacity:0}to{opacity:1}}
    @keyframes boxIntro{from{opacity:0;transform:scale(.92) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
    .anim-box{position:relative;z-index:1;animation:boxIntro .4s cubic-bezier(.22,1,.36,1) both}
    .doc-table tbody tr{animation:rowIntro .35s ease-out both}
    @keyframes rowIntro{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
    .camera-overlay{position:fixed;inset:0;z-index:250;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center}
    .camera-overlay.active{display:flex}
    .camera-overlay video{width:100%;height:100%;object-fit:cover}
    .camera-controls{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);display:flex;gap:30px;align-items:center}
    .cam-btn{width:56px;height:56px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:rgba(0,0,0,.4);color:#fff;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s}
    .cam-btn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.5);transform:scale(1.1)}
    .cam-btn.close-cam{border-color:#ff4d4d;color:#ff4d4d}.cam-btn.close-cam:hover{background:rgba(255,77,77,.2)}
    .cam-btn.capture{width:70px;height:70px;border-color:#fff;border-width:3px;font-size:1.4rem}.cam-btn.capture:hover{background:rgba(255,255,255,.2)}
    .flash{position:fixed;inset:0;background:#fff;z-index:260;opacity:0;pointer-events:none}
    .flash.fire{animation:flashAnim .4s ease-out}
    @keyframes flashAnim{0%{opacity:.9}100%{opacity:0}}
    @keyframes imgIntro{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
    @keyframes imgOutro{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.85)}}
    .preview-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;width:100%;max-width:90vw}
    .preview-stage{position:relative;width:100%;display:flex;justify-content:center;min-height:200px}
    .preview-content img{max-width:80vw;max-height:55vh;border-radius:12px;border:2px solid rgba(255,255,255,.1);box-shadow:0 20px 60px rgba(0,0,0,.5);animation:imgIntro .45s cubic-bezier(.22,1,.36,1) both;object-fit:contain;cursor:crosshair}
    .preview-label{margin-top:16px;color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.9rem;opacity:.7}
    .preview-actions{display:flex;gap:12px;margin-top:14px}
    .preview-btn{padding:10px 20px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:8px}
    .preview-btn:hover{background:rgba(255,255,255,.15)}
    .preview-btn.edit-btn{border-color:var(--sky);color:var(--sky)}.preview-btn.edit-btn:hover{background:rgba(61,170,232,.15);border-color:var(--sky);color:var(--sky)}
    .preview-btn.next-btn{background:linear-gradient(135deg,var(--gold),#b8882e);border-color:var(--gold);color:#fff}.preview-btn.next-btn:hover{box-shadow:0 0 20px var(--gold-glow);transform:translateY(-2px)}
    .save-box{width:340px;max-width:90vw;background:rgba(22,22,30,.95);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:28px;display:flex;flex-direction:column;gap:20px;max-height:90vh;overflow-y:auto}
    .save-box-title{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;color:var(--fg);display:flex;align-items:center;gap:10px}
    .save-box-title i{color:var(--gold)}
    .input-group{display:flex;flex-direction:column;gap:6px}
    .input-group label{font-size:.75rem;font-weight:500;color:var(--muted);letter-spacing:.8px;text-transform:uppercase}
    .input-group input{padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.9rem;outline:none;transition:border-color .25s,box-shadow .25s}
    .input-group input::placeholder{color:var(--muted);opacity:.6}
    .input-group input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
    .error-msg{font-size:.72rem;color:var(--accent);min-height:16px}
    .class-group{display:flex;flex-direction:column;gap:6px}
    .class-group label{font-size:.75rem;font-weight:500;color:var(--muted);letter-spacing:.8px;text-transform:uppercase}
    .class-options{display:flex;flex-direction:column;gap:8px}
    .class-btn{display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .25s}
    .class-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--muted);transition:all .25s;flex-shrink:0}
    .class-btn:hover{border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.03)}
    .class-btn.selected .class-dot{background:var(--gold);border-color:var(--gold)}
    .class-btn.c1 .class-dot{border-color:var(--teal)}.class-btn.c1.selected{border-color:var(--teal);background:rgba(46,196,162,.08)}.class-btn.c1.selected .class-dot{background:var(--teal);border-color:var(--teal)}
    .class-btn.c2 .class-dot{border-color:var(--sky)}.class-btn.c2.selected{border-color:var(--sky);background:rgba(61,170,232,.08)}.class-btn.c2.selected .class-dot{background:var(--sky);border-color:var(--sky)}
    .class-btn.c3 .class-dot{border-color:var(--purple)}.class-btn.c3.selected{border-color:var(--purple);background:rgba(155,89,182,.08)}.class-btn.c3.selected .class-dot{background:var(--purple);border-color:var(--purple)}
    .class-btn.c4 .class-dot{border-color:var(--rose)}.class-btn.c4.selected{border-color:var(--rose);background:rgba(232,85,119,.08)}.class-btn.c4.selected .class-dot{background:var(--rose);border-color:var(--rose)}
    .finished-btn{padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--gold),#b8882e);color:#fff;font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:8px}
    .finished-btn:hover{box-shadow:0 6px 24px var(--gold-glow);transform:translateY(-2px)}
    .finished-btn:active{transform:translateY(0) scale(.98)}
    .finished-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
    .table-box{width:440px;max-width:92vw;max-height:80vh;background:rgba(22,22,30,.96);border:1px solid rgba(255,255,255,.1);border-radius:18px;padding:24px;display:flex;flex-direction:column;gap:16px;overflow:hidden}
    .table-header{display:flex;align-items:center;justify-content:space-between;min-height:40px}
    .header-left{position:relative;display:flex;align-items:center;flex:1;overflow:hidden;height:40px}
    .table-title,.select-bar{position:absolute;left:0;right:0;top:0;bottom:0;display:flex;align-items:center;gap:10px;transition:opacity .3s,transform .3s;white-space:nowrap;padding-right:10px}
    .table-title{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;color:var(--fg);opacity:1;transform:translateY(0);pointer-events:auto}
    .table-title.hidden{opacity:0;transform:translateY(-12px);pointer-events:none}
    .select-bar{opacity:0;transform:translateY(12px);pointer-events:none;gap:8px;flex-wrap:nowrap}
    .select-bar.visible{opacity:1;transform:translateY(0);pointer-events:auto}
    .doc-count-icon{display:inline-flex;align-items:center;justify-content:center;min-width:24px;height:24px;border-radius:7px;padding:0 6px;color:#fff;font-size:.75rem;font-weight:700;font-family:'Space Grotesk',sans-serif;transition:background .3s;flex-shrink:0}
    .table-close{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;flex-shrink:0}
    .table-close:hover{color:var(--fg);border-color:rgba(255,255,255,.2)}
    .search-icon-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;flex-shrink:0}
    .search-icon-btn:hover{color:var(--fg);border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.04)}
    .search-input{display:none;padding:5px 10px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.82rem;outline:none;flex:1;min-width:0;transition:border-color .25s,box-shadow .25s}
    .search-input:focus{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold-glow)}
    .search-input::placeholder{color:var(--muted);opacity:.5}
    .search-clear-btn{display:none;width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.7rem;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;transition:all .25s}
    .search-clear-btn:hover{color:var(--fg)}
    #tableTitle.search-active .search-icon-btn{display:none}
    #tableTitle.search-active .search-input{display:block}
    #tableTitle.search-active .search-clear-btn{display:flex}
    .sel-btn{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.06);color:var(--fg);font-family:'Space Grotesk',sans-serif;font-size:.75rem;font-weight:500;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:6px;white-space:nowrap}
    .sel-btn:hover{background:rgba(255,255,255,.12)}
    .sel-btn.move-btn{background:linear-gradient(135deg,var(--gold),#b8882e);border-color:var(--gold);color:#fff}.sel-btn.move-btn:hover{box-shadow:0 4px 12px var(--gold-glow)}
    .sel-btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;box-shadow:none!important}
    .sel-btn.exit-btn{border-color:rgba(255,77,77,.3);color:#ff6b6b}.sel-btn.exit-btn:hover{background:rgba(255,77,77,.1)}
    .sel-btn.delete-sel-btn{border-color:rgba(255,77,77,.3);color:#ff6b6b}.sel-btn.delete-sel-btn:hover{background:rgba(255,77,77,.15)}
    .sel-count{font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:4px;white-space:nowrap}
    .table-wrap{overflow-y:auto;flex:1;border-radius:10px;border:1px solid var(--border)}

    const DB_SECRET = 'ZbDjXoOfSFQkYsVATKrPyN0xXIr1';
    const DB_PATH = 'users/' + DB_SECRET;
    const AUTH = '?auth=' + DB_SECRET;

    function restUrl(path) {
      var url = DB_URL + '/' + DB_PATH;
      if (path) url += '/' + path;
      return url + '.json' + AUTH;
    }
    
    async function restGet(path) {
      try {
        const res = await fetch(restUrl(path || ''));
        if (!res.ok) throw new Error('Network error');
        return await res.json();
      } catch(e) {
        try {
          const cached = localStorage.getItem('cache_' + (path || 'root'));
          return cached ? JSON.parse(cached) : null;
        } catch(ce) {
          return null;
        }
      }
    }
    
    async function restPush(path, data) {
      if (!isOnline) {
        queueOfflinePush(path, data);
        return { offline: true };
      }
      try {
        const res = await fetch(restUrl(path), {
          method: 'POST', body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error('Network error');
        const result = await res.json();
        cacheData(path, data);
        return result;
      } catch(e) {
        queueOfflinePush(path, data);
        return { offline: true };
      }
    }
    
    async function restSet(path, data) {
      if (!isOnline) {
        queueOfflinePush(path, data);
        return { offline: true };
      }
      try {
        await fetch(restUrl(path), {
          method: 'PUT', body: JSON.stringify(data)
        });
        cacheData(path, data);
        return { success: true };
      } catch(e) {
        queueOfflinePush(path, data);
        return { offline: true };
      }
    }
    
    async function restDelete(path) {
      if (!isOnline) {
        queueOfflineDelete(path);
        return { offline: true };
      }
      try {
        await fetch(restUrl(path), { method: 'DELETE' });
        return { success: true };
      } catch(e) {
        queueOfflineDelete(path);
        return { offline: true };
      }
    }
    
    async function restPatch(updates) {
      if (!isOnline) {
        queueOfflinePatch(updates);
        return { offline: true };
      }
      try {
        await fetch(restUrl(''), {
          method: 'PATCH', body: JSON.stringify(updates)
        });
        return { success: true };
      } catch(e) {
        queueOfflinePatch(updates);
        return { offline: true };
      }
    }

    function cacheData(path, data) {
      try {
        const cacheKey = 'cache_' + (path || 'root');
        localStorage.setItem(cacheKey, JSON.stringify(data));
      } catch(e) {}
    }

    function queueOfflinePush(path, data) {
      var q = JSON.parse(localStorage.getItem('offlineQueue') || '[]');
      q.push({ type: 'push', path: path, data: data });
      localStorage.setItem('offlineQueue', JSON.stringify(q));
    }

    function queueOfflineDelete(path) {
      var q = JSON.parse(localStorage.getItem('offlineQueue') || '[]');
      q.push({ type: 'delete', path: path });
      localStorage.setItem('offlineQueue', JSON.stringify(q));
    }

    function queueOfflinePatch(updates) {
      var q = JSON.parse(localStorage.getItem('offlineQueue') || '[]');
      q.push({ type: 'patch', updates: updates });
      localStorage.setItem('offlineQueue', JSON.stringify(q));
    }

    }

    function compressImage(src,q,mw){
      return new Promise(function(res){
        var img=new Image();
        img.onload=function(){
          var c=document.createElement('canvas'),w=img.width,h=img.height;
          if(w>mw){h=(mw/w)*h;w=mw;} c.width=w;c.height=h;
          c.getContext('2d').drawImage(img,0,0,w,h); res(c.toDataURL('image/jpeg',q));
        }; img.src=src;
      });
    }

    async function performMove(targetView){

        var _sel=[...selectedIds];

          var id=_sel[i], data=await restGet(activeView+'/'+id);

        var updates={}; selectedIds.forEach(function(id){updates[activeView+'/'+id]=null});
        await restPatch(updates);
        var sourceData = viewDataCache[activeView] || {};
        var targetData = viewDataCache[targetView] || {};
        selectedIds.forEach(function(id){
          if (sourceData[id]) {
            targetData[id] = sourceData[id];
            delete sourceData[id];
          }
        });
        viewDataCache[activeView] = sourceData;
        viewDataCache[targetView] = targetData;
        cacheData(activeView, sourceData);
        cacheData(targetView, targetData);
        exitSelectMode(); renderTable(activeView); showToast('<i class="fa-solid fa-check"></i> Moved!');
      } catch(e) { showToast('<i class="fa-solid fa-triangle-exclamation"></i> Move error'); }
    }

    document.getElementById('deleteSelBtn').addEventListener('click',function(){ if(selectedIds.size===0) return; requireAuth(function(){performDelete(selectedIds)}); });
    async function performDelete(ids){ 
      try{ 
        var updates={}; 
        ids.forEach(function(id){updates[activeView+'/'+id]=null}); 
        await restPatch(updates);
        var data = viewDataCache[activeView] || {};
        ids.forEach(function(id){ delete data[id]; });
        viewDataCache[activeView] = data;
        cacheData(activeView, data);
        exitSelectMode(); renderTable(activeView); showToast('<i class="fa-solid fa-trash"></i> Deleted'); 
      }catch(e){showToast('<i class="fa-solid fa-triangle-exclamation"></i> Delete error');} 
    }
    document.getElementById('moveCancelBtn').addEventListener('click',function(){document.getElementById('moveOverlay').classList.remove('active')});

    // --- 12. Detail View ---
    async function openDetail(view,id,doc){
      currentDetailId=id; currentDetailView=view; detailImages.innerHTML='';
      detailOverlay.classList.add('active');
      if(!doc){
        detailImages.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted)">Loading image...</div>';
        try { 
          doc=await restGet(view+'/'+id);
          if (!doc) {
            var cached = viewDataCache[view];
            if (cached && cached[id]) {
              doc = cached[id];
            }
          }
        } catch(e){ 
          var cached = viewDataCache[view];
          if (cached && cached[id]) {
            doc = cached[id];
          } else {
            detailImages.innerHTML='<div style="text-align:center;padding:30px;color:var(--accent)">Error loading</div>'; 
            return; 
          }
        }
        if(!doc){ 
          detailImages.innerHTML='<div style="text-align:center;padding:30px;color:var(--muted)">Not found</div>'; 
          return; 
        }
        detailImages.innerHTML='';
      }
      addImageToDetail(doc.image,doc.name,doc.user,id,view);
      if(doc.extraImages){ 
        Object.entries(doc.extraImages).forEach(function(e){ 
          addImageToDetail(e[1].image,e[1].name,doc.user,e[0],view,true,id); 
        }); 
      }
    }

    function addImageToDetail(src,name,user,id,view,isExtra,parentId){
      isExtra=isExtra||false; parentId=parentId||null;
      var item=document.createElement('div'); item.className='detail-img-item';
      item.innerHTML='<div class="detail-img-stage"><img src="'+src+'" alt="'+name+'"></div><div class="detail-img-name-block"><div class="detail-img-main-name">'+name+'</div><div class="detail-img-user-name">'+user+'</div></div><div class="img-divider"></div><div class="img-actions"><button class="download-btn"><i class="fa-solid fa-download"></i> Download</button><button class="delete-btn"><i class="fa-solid fa-trash-can"></i> Delete</button></div>';
      
      item.querySelector('.download-btn').onclick=function(){ 
        fetch(src).then(function(r){return r.blob()}).then(function(blob){ 
          var url=URL.createObjectURL(blob); 
          var a=document.createElement('a'); 
          a.href=url; 
          a.download = (user || 'User') + ' (' + (name || 'Image') + ').jpg';
          document.body.appendChild(a); 
          a.click(); 
          a.remove(); 
          URL.revokeObjectURL(url); 
        }); 
      };
      
      item.querySelector('.delete-btn').onclick=function(){ 
        requireAuth(async function(){ 
          try{ 
            if(isExtra) await restDelete(view+'/'+parentId+'/extraImages/'+id); 
            else await restDelete(view+'/'+id); 
            if (!isExtra) {
              var data = viewDataCache[view] || {};
              delete data[id];
              viewDataCache[view] = data;
              cacheData(view, data);
            }
            item.style.animation='imgOutro .3s ease forwards'; 
            setTimeout(function(){item.remove();if(detailImages.children.length===0)detailOverlay.classList.remove('active')},300); 
            showToast('<i class="fa-solid fa-trash"></i> Deleted'); 
            if (!isExtra && activeView === view) renderTable(view);
          }catch(e){showToast('Delete error')} 
        }); 
      };
      detailImages.appendChild(item);
    }
    document.getElementById('detailCloseBtn').addEventListener('click',function(){detailOverlay.classList.remove('active')});

    // --- 13. Add Extra Images ---
    document.getElementById('addImgBtn').addEventListener('click',function(){resetAddImgSteps();addImgOverlay.classList.add('active')});
    document.getElementById('addImgCancelBtn').addEventListener('click',function(){addImgOverlay.classList.remove('active')});
    document.getElementById('addImgFileBtn').addEventListener('click',function(){addImgFileInput.click()});
    addImgFileInput.addEventListener('change',function(e){ if(e.target.files[0]) processAddImg(URL.createObjectURL(e.target.files[0])); addImgFileInput.value=''; });

    document.getElementById('addImgCamBtn').addEventListener('click', async function(){
      try {
        var camStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:{exact:"environment"}},audio:false}).catch(function(){return navigator.mediaDevices.getUserMedia({video:true,audio:false})});
        cameraVideo.srcObject=camStream; cameraOverlay.classList.add('active');
        document.getElementById('captureBtn').onclick=function(){
          document.getElementById('flash').classList.add('fire');
          captureCanvas.width=cameraVideo.videoWidth; captureCanvas.height=cameraVideo.videoHeight;
          captureCanvas.getContext('2d').drawImage(cameraVideo,0,0);
          if(camStream) camStream.getTracks().forEach(function(t){t.stop()});
          cameraOverlay.classList.remove('active');
          processAddImg(captureCanvas.toDataURL('image/jpeg',0.85));
        };
      } catch(e) { showToast('<i class="fa-solid fa-camera-rotate"></i> Camera error'); }
    });

    function resetAddImgSteps(){
      document.getElementById('addImgStep1').style.display='flex';
      document.getElementById('addImgStep2').classList.remove('visible');
      document.getElementById('addImgStep3').classList.remove('visible');
      document.getElementById('addImgNameInput').value='';
      document.getElementById('addImgSaveBtn').disabled=true;
      newExtraImg=null;
    }

    function processAddImg(src){
      newExtraImg=src;
      document.getElementById('addImgPreview').src=src; document.getElementById('addImgPreview').style.clipPath='';
      document.getElementById('addImgStep1').style.display='none';
      document.getElementById('addImgStep2').classList.add('visible');
      document.getElementById('addImgEditBtn').innerHTML='<i class="fa-solid fa-crop-simple"></i> Edit';
      var nextHandler=function(){
        document.getElementById('addImgThumb').src=newExtraImg;
        document.getElementById('addImgStep2').classList.remove('visible');
        document.getElementById('addImgStep3').classList.add('visible');
        document.getElementById('addImgNameInput').focus();
        document.getElementById('addImgNextBtn').removeEventListener('click',nextHandler);
      };
      document.getElementById('addImgNextBtn').addEventListener('click',nextHandler);
    }

    document.getElementById('addImgEditBtn').addEventListener('click',function(){
      var img=document.getElementById('addImgPreview'),isE=img.style.clipPath!=='';
      img.style.clipPath=isE?'':'inset(10% 10% 10% 10%)';
      document.getElementById('addImgEditBtn').innerHTML=isE?'<i class="fa-solid fa-crop-simple"></i> Edit':'<i class="fa-solid fa-check"></i> Done';
    });

    document.getElementById('addImgNameInput').addEventListener('input',function(e){document.getElementById('addImgSaveBtn').disabled=!e.target.value.trim()});

    document.getElementById('addImgSaveBtn').addEventListener('click', async function(){
      var name=document.getElementById('addImgNameInput').value.trim();
      if(!name||!newExtraImg||!currentDetailId) return;
      uploadOverlay.classList.add('active'); uploadText.textContent='Adding Image...'; uploadSub.textContent='Compressing'; uploadOfflineNote.style.display='none';
      try {
        var base64=await compressImage(newExtraImg,0.6,1200);
        var entry={name:name,image:base64};
        if(isOnline){ 
          await restPush(currentDetailView+'/'+currentDetailId+'/extraImages',entry); 
          showToast('<i class="fa-solid fa-check"></i> Image added!'); 
        } else { 
          queueOfflinePush(currentDetailView+'/'+currentDetailId+'/extraImages',entry); 
          uploadOfflineNote.style.display='flex'; 
          showToast('<i class="fa-solid fa-wifi-slash"></i> Saved offline');
        }
        addImgOverlay.classList.remove('active'); uploadOverlay.classList.remove('active');
        var docData=await restGet(currentDetailView+'/'+currentDetailId);
        if(docData) openDetail(currentDetailView,currentDetailId,docData);
      } catch(e) { showToast('Error adding image'); uploadOverlay.classList.remove('active'); }
    });

    // --- 14. Offline Sync ---
    function queueOfflinePush(path,data){ 
      var q=JSON.parse(localStorage.getItem('offlineQueue')||'[]'); 
      q.push({path:path,data:data}); 
      localStorage.setItem('offlineQueue',JSON.stringify(q)); 
    }
    
    async function syncOfflineData(){
      var q=JSON.parse(localStorage.getItem('offlineQueue')||'[]'); 
      if(!q.length) return;
      var sc=0;
      for (var i = 0; i < q.length; i++) {
        var item = q[i];
        try {
          if (item.type === 'push') {
            await restPush(item.path, item.data);
            sc++;
          } else if (item.type === 'delete') {
            await restDelete(item.path);
            sc++;
          } else if (item.type === 'patch') {
            await restPatch(item.updates);
            sc++;
          }
        } catch(e) {}
      }
      if(sc>0){
        localStorage.removeItem('offlineQueue');
        showToast('<i class="fa-solid fa-cloud-arrow-up"></i> Synced '+sc+' items!',3000);
        updateAllViews();
        updateBadges();
      }
    }

    // --- 15. Background Particles ---
    var particlesEl=document.getElementById('particles');
    for(var i=0;i<25;i++){var p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.bottom='-10px';p.style.animationDuration=(Math.random()*10+8)+'s';p.style.animationDelay=(Math.random()*10)+'s';p.style.width=(Math.random()*3+1)+'px';p.style.height=p.style.width;particlesEl.appendChild(p);}

    if (!navigator.onLine) {
      showToast('<i class="fa-solid fa-wifi-slash"></i> You are offline - using cached data', 3000);
    }

  </script>

</body>
</html>
